async function dbLoad() {
  try {
    const r = await fetch(`${GAS_URL}?action=load`);
    if (!r.ok) return null;
    const data = await r.json();
    return data;
  } catch(e) { console.error("dbLoad:", e); return null; }
}

async function dbSave(payload, actionLog) {
  try {
    const fd = new FormData();
    fd.append("data", JSON.stringify({ ...payload, action_log: actionLog || "" }));
    const r = await fetch(GAS_URL, { method: "POST", body: fd, redirect: "follow" });
    // Try to read response, but if blocked by CORS just trust the status
    try {
      const txt = await r.text();
      if (txt.includes("ok") || txt.includes("true")) return true;
      const j = JSON.parse(txt);
      return j.ok === true;
    } catch {
      // Response unreadable but request went through
      return r.ok || r.type === "opaqueredirect" || r.status === 0;
    }
  } catch(e) { console.error("dbSave:", e); return false; }
}

async function dbSaveEmployees(employees) {
  return await dbSave({ employees, trainings: [], _ts: Date.now() });
}

let CURRENT_LANG = localStorage.getItem("tt_lang") || "pt";
function tr(key, vars) {
  let str = I18N[CURRENT_LANG][key] || I18N.pt[key] || key;
  if (vars) Object.keys(vars).forEach(k => { str = str.replace(`{${k}}`, vars[k]); });
  return str;
}


function parseDate(s) {
  if (!s) return null;
  try { const d = new Date(s); if (!isNaN(d)) return d; } catch {}
  return null;
}
function daysUntil(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return null;
  return Math.round((d - TODAY) / (1000*60*60*24));
}
function formatDate(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return "—";
  return d.toLocaleDateString(I18N[CURRENT_LANG].locale, { day:"2-digit", month:"short", year:"numeric" });
}
function expirationStatus(expStr) {
  if (!expStr) return "no-exp";
  const days = daysUntil(expStr);
  if (days === null) return "no-exp";
  if (days < 0) return "expired";
  if (days <= 30) return "expiring";
  return "valid";
}
function pctColor(pct) {
  if (pct >= 80) return "#22c55e";
  if (pct >= 50) return "#f59e0b";
  return "#ef4444";
}

    "no-exp": { bg:"#1e293b", text:"#64748b", label:tr("no_exp_badge") },
  };
}
let BADGE = makeBadges();

function StatusBadge({ status, days }) {
  const c = BADGE[status];
  const label = status === "expiring" && days !== null ? `${days}d` : c.label;
  return React.createElement("span", {
    style: { background:c.bg, color:c.text, borderRadius:6, padding:"2px 8px", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }
  }, label);
}

  // ─ Upload ─
  function Upload() {
    const dragOver = upload_dragOver, setDragOver = upload_setDragOver;
    const results = upload_results, setResults = upload_setResults;
    const processing = upload_processing, setProcessing = upload_setProcessing;

    function parseExcelDate(val) {
      if (!val) return null;
      if (val instanceof Date) return val.toISOString().slice(0,10);
      if (typeof val === "number") {
        // Excel serial date
        const d = new Date(Math.round((val - 25569) * 86400 * 1000));
        return d.toISOString().slice(0,10);
      }
      const s = String(val).trim();
      if (!s || s==="NaN" || s.toUpperCase()==="NAN") return null;
      const d = new Date(s);
      return isNaN(d) ? null : d.toISOString().slice(0,10);
    }

    async function processFile(file) {
      setProcessing(true);
      setResults(null);
      try {
        const XLSX = await importr("https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs");
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type:"array", cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval:null });

        const added = [], updated = [], duplicates = [], skipped = [];

        for (const row of rows) {
          const name = String(row["Name"] || row["name"] || row["NOME"] || row["Nome"] || "").trim();
          if (!name) { skipped.push("(linha sem nome)"); continue; }

          const newTrainings = {};
          for (const [k,v] of Object.entries(row)) {
            const key = String(k).trim();
            if (["Name","name","NOME","Nome","Working Site","Contract Status","U#","Union Job Title","State","Issued","Expiration"].includes(key)) continue;
            if (v && String(v).trim() && String(v).trim()!=="null") {
              newTrainings[key] = { issued: parseExcelDate(v), expiration: null };
            }
          }

          const existing = employees.find(e => e.name.toLowerCase() === name.toLowerCase());
          if (existing) {
            const newKeys = Object.keys(newTrainings).filter(t => !existing.trainings?.[t]);
            if (newKeys.length > 0) {
              updated.push({ name, newTrainings: Object.fromEntries(newKeys.map(t=>[t,newTrainings[t]])) });
            } else {
              duplicates.push(name);
            }
          } else {
            added.push({
              name,
              job_title: String(row["Union Job Title"]||row["job_title"]||"").trim(),
              working_site: String(row["Working Site"]||row["working_site"]||"").trim(),
              state: String(row["State"]||row["state"]||"").trim(),
              union_number: String(row["U#"]||row["union_number"]||"").trim(),
              contract_status: String(row["Contract Status"]||row["contract_status"]||"ACTIVE").trim(),
              trainings: newTrainings
            });
          }
        }
        setResults({ added, updated, duplicates, skipped });
      } catch(err) {
        setResults({ error: String(err) });
      }
      setProcessing(false);
    }

    function applyImport() {
      if (!results) return;
      setEmployees(prev => {
        let list = [...prev];
        // Add new
        for (const emp of results.added) list = [emp, ...list];
        // Update existing with new trainings
        for (const upd of results.updated) {
          list = list.map(e => e.name.toLowerCase()===upd.name.toLowerCase()
            ? {...e, trainings:{...e.trainings,...upd.newTrainings}} : e);
        }
        return list;
      });
      setResults(null);
      setView("emps");
    }

      const file = ev.dataTransfer.files[0];

  // ─ Por Obra/Local ─
  function BySite() {
    const selectedSite = bysite_selected, setSelectedSite = bysite_setSelected;
    const sites = useMemo(() => {
      const set = new Map();
      employees.filter(e=>e.contract_status==="ACTIVE").forEach(emp=>{
        const site = emp.working_site || tr("no_site");
        if (!set.has(site)) set.set(site, []);
        set.get(site).push(emp);
      });
      return Array.from(set.entries())
        .map(([name, emps]) => ({ name, employees: emps, count: emps.length }))
        .sort((a,b) => b.count - a.count);
    }, [employees]);

    function siteStats(siteEmps) {
      const total = siteEmps.length;
      if (!total) return { overall:0, courses:[], alerts:0 };
      const courses = MANDATORY.map(t => {
        const count = siteEmps.filter(e => e.trainings?.[t]).length;
        const pct = Math.round(count / total * 100);
        return { name:t, count, pct, total };
      });
      const overall = Math.round(courses.reduce((a,c)=>a+c.pct, 0) / courses.length);
      let alertsCount = 0;
      for (const emp of siteEmps) {
        for (const [t, v] of Object.entries(emp.trainings||{})) {
          const st = expirationStatus(v.expiration);
          if (st === "expired" || st === "expiring") alertsCount++;
        }
      }
      return { overall, courses, alerts: alertsCount };
    }

    return e("div",null,
      e("h2",{style:s.h2},tr("bysite_title")),
      e("div",{style:{color:"#64748b",fontSize:12,marginBottom:14}},
        `${sites.length} ${tr("bysite_desc")}`

        ? e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}},

              const stats = siteStats(site.employees);
              return e("div",{key:site.name,
                style:{...s.card,marginBottom:0,cursor:"pointer",transition:"transform 0.15s,border-color 0.15s"},
                onMouseEnter:ev=>{ev.currentTarget.style.borderColor="#38bdf8";ev.currentTarget.style.transform="translateY(-2px)"},
                onMouseLeave:ev=>{ev.currentTarget.style.borderColor="#334155";ev.currentTarget.style.transform="translateY(0)"},
                onClick:()=>setSelectedSite(site.name)
              },
                e("div",{style:{fontWeight:700,fontSize:15,marginBottom:4,color:"#e2e8f0"}},site.name),
                e("div",{style:{fontSize:12,color:"#64748b",marginBottom:14}},`${site.count} ${tr("active_emps").toLowerCase()}`),
                e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
                  e("span",{style:{color:"#94a3b8",fontSize:13}},tr("completion_mandatory_label")),
                  e("span",{style:{color:stats.overall>=80?"#22c55e":stats.overall>=50?"#f59e0b":"#ef4444",fontWeight:800,fontSize:18}},stats.overall+"%")
                ),
                e("div",{style:{height:6,background:"#0f172a",borderRadius:3,overflow:"hidden"}},
                  e("div",{style:{width:stats.overall+"%",height:"100%",background:stats.overall>=80?"#22c55e":stats.overall>=50?"#f59e0b":"#ef4444"}})
                ),

                  "⚠️", `${stats.alerts} ${tr("expiration_alerts")}`

              );
            })
          )
        : (() => {
            const site = sites.find(s=>s.name===selectedSite);
            if (!site) return e("div",null,"Obra não encontrada");
            const stats = siteStats(site.employees);
            return e("div",null,

                e("div",{style:{color:"#94a3b8",fontSize:13,marginBottom:20}},`${site.count} ${tr("active_emps").toLowerCase()}`),

  // ─ Relatórios PDF ─
  function Reports() {
    const generating = reports_generating, setGenerating = reports_setGenerating;
    const reportType = reports_type, setReportType = reports_setType;

    function downloadPDF(doc, filename) {
      doc.save(filename);
      setGenerating(false);
    }

    function pdfHeader(doc, title, subtitle) {
      doc.setFillColor(15, 23, 42);
      doc.rect(0, 0, 210, 28, "F");
      doc.setTextColor(56, 189, 248);
      doc.setFontSize(20);
      doc.setFontr("helvetica", "bold");
      doc.textr("TrainingTracker", 14, 14);
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(11);
      doc.setFontr("helvetica", "normal");
      doc.text(title, 14, 22);
      if (subtitle) {
        doc.setTextColor(148, 163, 184);
        doc.setFontSize(9);
        doc.text(subtitle, 196, 22, {align:"right"});
      }
    }

    function genAllAlerts() {
      setGenerating(true); setReportType("alerts");
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const dateStr = new Date().toLocaleDateString("pt-BR");
      pdfHeader(doc, "Relatório de Alertas de Vencimento", `Gerado em ${dateStr}`);
      
      doc.setTextColor(0,0,0);
      doc.setFontSize(11);
      doc.text(`Total de alertas: ${alerts.length}  •  Funcionários ativos: ${activeEmps.length}`, 14, 38);
      
      const rows = alerts.map(a => [
        a.emp, a.training, formatDate(a.expiration),
        a.status === "expired" ? "EXPIRADO" : `${a.days} dias`
      ]);
      
      doc.autoTable({
        startY: 44,
        head: [["Funcionário", "Treinamento", "Vencimento", "Status"]],
        body: rows,
        headStyles: { fillColor: [30, 58, 82], textColor: [56, 189, 248], fontStyle:"bold" },
        bodyStyles: { fontSize: 9 },
        alternateRowStyles: { fillColor: [248, 250, 252] },
        didParseCell: data => {
          if (data.column.index === 3 && data.section === "body") {
            if (data.cell.raw === "EXPIRADO") {
              data.cell.styles.textColor = [153, 27, 27];
              data.cell.styles.fontStyle = "bold";
            } else {
              data.cell.styles.textColor = [146, 64, 14];
            }
          }
        }
      });
      
      downloadPDF(doc, `alertas-vencimento-${dateStr.replace(/\//g,"-")}.pdf`);
    }

    function genMandatoryStatus() {
      setGenerating(true); setReportType("mandatory");
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const dateStr = new Date().toLocaleDateString("pt-BR");
      pdfHeader(doc, "Status dos Cursos Obrigatórios", `Gerado em ${dateStr}`);
      
      doc.setTextColor(0,0,0);
      doc.setFontSize(11);
      doc.text(`${tr("base")} ${activeEmps.length} ${tr("active_emps").toLowerCase()}`, 14, 38);
      
      let yPos = 50;
      MANDATORY.forEach(t => {
        const withCourse = activeEmps.filter(e => e.trainings?.[t]);
        const without = activeEmps.filter(e => !e.trainings?.[t]);
        const pct = Math.round(withCourse.length / activeEmps.length * 100);
        
        doc.setFillColor(30, 58, 82);
        doc.rect(14, yPos-5, 182, 8, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontr("helvetica","bold");
        doc.setFontSize(11);
        doc.text(`${t}  —  ${pct}% (${withCourse.length}/${activeEmps.length})`, 16, yPos);
        yPos += 8;
        
        if (without.length > 0) {
          doc.setTextColor(153, 27, 27);
          doc.setFontr("helvetica","normal");
          doc.setFontSize(9);
          doc.text(`SEM TREINAMENTO (${without.length}):`, 14, yPos+2);
          yPos += 6;
          const names = without.map(e=>e.name).join(", ");
          const lines = doc.splitTextToSize(names, 180);
          doc.setTextColor(60,60,60);
          doc.text(lines, 14, yPos);
          yPos += lines.length * 4 + 6;
        }
        
        if (yPos > 260) { doc.addPage(); yPos = 20; }
      });
      
      downloadPDF(doc, `status-obrigatorios-${dateStr.replace(/\//g,"-")}.pdf`);
    }

    function genBySite() {
      setGenerating(true); setReportType("bysite");
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const dateStr = new Date().toLocaleDateString("pt-BR");
      pdfHeader(doc, "Relatório por Obra/Local", `Gerado em ${dateStr}`);
      
      const sitesMap = new Map();
      activeEmps.forEach(emp => {
        const site = emp.working_site || tr("no_site");
        if (!sitesMap.has(site)) sitesMap.set(site, []);
        sitesMap.get(site).push(emp);
      });
      const sortedSites = Array.from(sitesMap.entries()).sort((a,b)=>b[1].length-a[1].length);
      
      doc.setTextColor(0,0,0);
      doc.setFontSize(11);
      doc.text(`${sortedSites.length} obras • ${activeEmps.length} funcionários ativos`, 14, 38);
      
      const rows = sortedSites.map(([site, emps]) => {
        const completion = MANDATORY.map(t => emps.filter(e=>e.trainings?.[t]).length / emps.length * 100);
        const avg = Math.round(completion.reduce((a,b)=>a+b,0) / completion.length);
        let alertsCount = 0;
        for (const emp of emps) {
          for (const [t,v] of Object.entries(emp.trainings||{})) {
            const st = expirationStatus(v.expiration);
            if (st==="expired"||st==="expiring") alertsCount++;
          }
        }
        return [site, emps.length, avg + "%", alertsCount];
      });
      
      doc.autoTable({
        startY: 44,
        head: [["Obra/Local", "Ativos", "Conclusão", "Alertas"]],
        body: rows,
        headStyles: { fillColor: [30, 58, 82], textColor: [56, 189, 248], fontStyle:"bold" },
        bodyStyles: { fontSize: 10 },
        alternateRowStyles: { fillColor: [248, 250, 252] }
      });
      
      downloadPDF(doc, `relatorio-obras-${dateStr.replace(/\//g,"-")}.pdf`);
    }

    function genFullList() {
      setGenerating(true); setReportType("full");
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape" });
      const dateStr = new Date().toLocaleDateString("pt-BR");
      pdfHeader(doc, "Lista Completa de Funcionários", `Gerado em ${dateStr}`);
      doc.setTextColor(0,0,0);
      doc.setFontSize(11);
      doc.text(`${employees.length} funcionários (${activeEmps.length} ativos)`, 14, 38);

      const rows = employees.map(e => [
        e.name,
        e.contract_status,
        e.working_site||"—",
        e.job_title||"—",
        e.state||"—",
        Object.keys(e.trainings||{}).length,
        Object.entries(e.trainings||{}).filter(([,v])=>["expired","expiring"].includes(expirationStatus(v.expiration))).length || ""
      ]);

      doc.autoTable({
        startY: 44,
        head: [["Nome","Status","Local","Cargo","UF","Treinamentos","Alertas"]],
        body: rows,
        headStyles: { fillColor:[30,58,82], textColor:[56,189,248], fontStyle:"bold" },
        bodyStyles: { fontSize: 8 },
        alternateRowStyles: { fillColor:[248,250,252] }
      });
      downloadPDF(doc, `lista-funcionarios-${dateStr.replace(/\//g,"-")}.pdf`);
    }

    const reportCards = [
      { id:"alerts", title:tr("rep_alerts_title"), desc:tr("rep_alerts_desc"), action:genAllAlerts, color:"#ef4444" },
      { id:"mandatory", title:tr("rep_mandatory_title"), desc:tr("rep_mandatory_desc"), action:genMandatoryStatus, color:"#38bdf8" },
      { id:"bysite", title:tr("rep_bysite_title"), desc:tr("rep_bysite_desc"), action:genBySite, color:"#22c55e" },
      { id:"full", title:tr("rep_full_title"), desc:tr("rep_full_desc"), action:genFullList, color:"#a78bfa" },
    ];

    return e("div",null,
      e("h2",{style:s.h2},tr("reports_title")),
      e("div",{style:{color:"#64748b",fontSize:13,marginBottom:20}},
        tr("reports_desc")
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}},
        ...reportCards.map(r =>
          e("div",{key:r.id,
            style:{...s.card,marginBottom:0,borderLeft:`4px solid ${r.color}`}
          },
            e("div",{style:{fontWeight:700,fontSize:15,marginBottom:6}},r.title),
            e("div",{style:{color:"#94a3b8",fontSize:13,marginBottom:14,minHeight:36}},r.desc),
            e("button",{
              style:{...s.btn("primary"),opacity:generating?0.6:1},
              disabled:generating,
              onClick:r.action
            }, generating && reportType===r.id ? tr("generating") : tr("download_pdf"))
          )
        )
      )
    );
  }

  // ─ Schedule ─
  function Schedule() {
    const showForm = sched_showForm, setShowForm = sched_setShowForm;
    const editingId = sched_editingId, setEditingId = sched_setEditingId;
    const formData = sched_formData, setFormData = sched_setFormData;
    const participantSearch = sched_participantSearch, setParticipantSearch = sched_setParticipantSearch;

    function resetForm() {
      setFormData({ training:"", date:"", location:"", instructor:"", notes:"", participants:[], status:"scheduled" });
      setShowForm(false);
      setEditingId(null);
      setParticipantSearch("");
    }

    function createSchedule() {
      if (!formData.training || !formData.date) {
        alert(tr("sched_training") + " + " + tr("sched_date"));
        return;
      }
      if (editingId) {
        setScheduledTrainings(prev => prev.map(s => s.id === editingId ? { ...formData, id: editingId } : s));
      } else {
        const newSched = { ...formData, id: "sch_" + Date.now(), createdAt: new Date().toISOString() };
        setScheduledTrainings(prev => [newSched, ...prev]);
      }
      resetForm();
    }

    function editSched(s) {
      setFormData({ ...s });
      setEditingId(s.id);
      setShowForm(true);
    }

    function completeSchedule(sched) {
      if (!window.confirm(tr("confirm_complete", { n: sched.participants.length }))) return;
      // Apply training to all participants
      const issuedDate = sched.date;
      setEmployees(prev => prev.map(emp => {
        if (sched.participants.includes(emp.name)) {
          return {
            ...emp,
            trainings: {
              ...emp.trainings,
              [sched.training]: { issued: issuedDate, expiration: null }
            }
          };
        }
        return emp;
      }));
      setScheduledTrainings(prev => prev.map(s => s.id === sched.id ? { ...s, status: "completed", completedAt: new Date().toISOString() } : s));
    }

    function cancelSched(id) {
      if (!window.confirm(tr("confirm_cancel"))) return;
      setScheduledTrainings(prev => prev.map(s => s.id === id ? { ...s, status: "cancelled" } : s));
    }

    function deleteSched(id) {
      if (!window.confirm(tr("confirm_delete_sched"))) return;
      setScheduledTrainings(prev => prev.filter(s => s.id !== id));
    }

    function toggleParticipant(name) {
      setFormData(p => ({
        ...p,
        participants: p.participants.includes(name)
          ? p.participants.filter(n => n !== name)
          : [...p.participants, name]
      }));
    }

    function statusColor(status) {
      if (status === "scheduled") return { bg:"#0f2744", border:"#38bdf8", text:"#38bdf8" };
      if (status === "progress") return { bg:"#2d1a00", border:"#f59e0b", text:"#f59e0b" };
      if (status === "completed") return { bg:"#0d2d1a", border:"#22c55e", text:"#22c55e" };
      if (status === "cancelled") return { bg:"#1e293b", border:"#64748b", text:"#64748b" };
      return { bg:"#1e293b", border:"#334155", text:"#94a3b8" };
    }

    function dayLabel(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return "—";
      const days = daysUntil(dateStr);
      if (days === 0) return tr("today");
      if (days === 1) return tr("tomorrow");
      if (days < 0) return Math.abs(days) + " " + tr("days_left") + " (-)";
      return "+" + days + " " + tr("days_left");
    }

    // Filter active employees for participant selection
    const availableEmps = employees
      .filter(emp => emp.contract_status === "ACTIVE")
      .filter(emp => !participantSearch || emp.name.toLowerCase().includes(participantSearch.toLowerCase()));

    // Sort schedules by date
    const sorted = [...scheduledTrainings].sort((a, b) => {
      if (a.date < b.date) return -1;
      if (a.date > b.date) return 1;
      return 0;
    });

    const upcoming = sorted.filter(s => s.status === "scheduled" && parseDate(s.date) >= new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()));
    const past = sorted.filter(s => s.status !== "scheduled" || parseDate(s.date) < new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()));

    function ScheduleCard({ s }) {
      const sc = statusColor(s.status);
      return e("div", { style: { ...s2.card, marginBottom:12, borderLeft:`4px solid ${sc.border}` } },
        e("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, flexWrap:"wrap", gap:8 } },
          e("div", { style: { flex:1, minWidth:200 } },
            e("div", { style: { fontWeight:700, fontSize:15, marginBottom:4 } }, s.training),
            e("div", { style: { color:"#94a3b8", fontSize:12 } },
              "📅 " + formatDate(s.date) + " · " + dayLabel(s.date),
              s.location ? " · 📍 " + s.location : "",
              s.instructor ? " · 👤 " + s.instructor : ""
            )
          ),
          e("span", { style: {
            padding:"3px 10px", borderRadius:8, fontSize:11, fontWeight:700,
            background:sc.bg, color:sc.text, border:`1px solid ${sc.border}`
          }}, tr("status_" + s.status))
        ),
        s.notes && e("div", { style: { color:"#64748b", fontSize:12, marginBottom:10, fontStyle:"italic" } }, s.notes),
        e("div", { style: { marginBottom:10 } },
          e("div", { style: { color:"#64748b", fontSize:11, marginBottom:4, fontWeight:600 } },
            tr("sched_participants") + ` (${s.participants.length})`
          ),
          e("div", { style: { display:"flex", flexWrap:"wrap", gap:4 } },
            ...s.participants.slice(0, 20).map(name =>
              e("span", { key:name, style: {
                background:"#0f172a", border:"1px solid #334155", borderRadius:6,
                padding:"2px 8px", fontSize:11, color:"#cbd5e1", cursor:"pointer"
              }, onClick:()=>{
                const emp = employees.find(emp => emp.name === name);
                if (emp) openEmp(emp);
              }}, name)
            ),
            s.participants.length > 20 && e("span", { style:{ color:"#64748b", fontSize:11, padding:"2px 4px" } },
              "+" + (s.participants.length - 20)
            )
          )
        ),
        e("div", { style: { display:"flex", gap:6, flexWrap:"wrap" } },
          s.status === "scheduled" && e("button", { style:s2.btn("success"), onClick:()=>completeSchedule(s) }, tr("mark_completed")),
          s.status === "scheduled" && e("button", { style:s2.btn(), onClick:()=>editSched(s) }, tr("edit_schedule")),
          s.status === "scheduled" && e("button", { style:s2.btn(), onClick:()=>cancelSched(s.id) }, tr("mark_cancelled")),
          e("button", { style:s2.btn("danger"), onClick:()=>deleteSched(s.id) }, tr("delete_schedule"))
        )
      );
    }

    // s alias for styles since variable name conflict
    const s2 = s;

    return e("div", null,
      e("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10 } },
        e("h2", { style:s2.h2 }, tr("schedule_title")),
        !showForm && e("button", { style:s2.btn("success"), onClick:()=>setShowForm(true) }, tr("new_schedule"))
      ),

      // Form
      showForm && e("div", { style: { ...s2.card, border:"1px solid #22c55e", marginBottom:16 } },
        e("div", { style: { fontWeight:700, fontSize:15, marginBottom:14, color:"#22c55e" } },
          editingId ? tr("edit_schedule") : tr("new_schedule")
        ),
        e("div", { style: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 } },
          e("div", null,
            e("label", { style:{color:"#64748b",fontSize:11,display:"block",marginBottom:3} }, tr("sched_training") + " *"),
            e("select", { style:{...s2.sel,width:"100%"}, value:formData.training,
              onChange:ev=>setFormData(p=>({...p,training:ev.target.value})) },
              e("option", { value:"" }, "—"),
              e("optgroup", { label:tr("mandatory_group") },
                ...MANDATORY.map(t => e("option", { key:t, value:t }, t))
              ),
              e("optgroup", { label:tr("others_group") },
                ...trainings.filter(t=>!MANDATORY.includes(t)).map(t => e("option", { key:t, value:t }, t))
              )
            )
          ),
          e("div", null,
            e("label", { style:{color:"#64748b",fontSize:11,display:"block",marginBottom:3} }, tr("sched_date") + " *"),
            e("input", { type:"date", style:s2.input, value:formData.date,
              onChange:ev=>setFormData(p=>({...p,date:ev.target.value})) })
          ),
          e("div", null,
            e("label", { style:{color:"#64748b",fontSize:11,display:"block",marginBottom:3} }, tr("sched_location")),
            e("input", { style:s2.input, placeholder:tr("location_ph"), value:formData.location,
              onChange:ev=>setFormData(p=>({...p,location:ev.target.value})) })
          ),
          e("div", null,
            e("label", { style:{color:"#64748b",fontSize:11,display:"block",marginBottom:3} }, tr("sched_instructor")),
            e("input", { style:s2.input, placeholder:tr("instructor_ph"), value:formData.instructor,
              onChange:ev=>setFormData(p=>({...p,instructor:ev.target.value})) })
          )
        ),
        e("div", { style:{marginBottom:14} },
          e("label", { style:{color:"#64748b",fontSize:11,display:"block",marginBottom:3} }, tr("notes_label")),
          e("textarea", { style:{...s2.input,minHeight:50,fontFamily:"inherit"}, value:formData.notes,
            onChange:ev=>setFormData(p=>({...p,notes:ev.target.value})) })
        ),

        // Participants picker
        e("div", { style:{marginBottom:14} },
          e("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:8} },
            e("label", { style:{color:"#64748b",fontSize:11,fontWeight:600} },
              tr("select_participants") + ` (${formData.participants.length})`
            ),
            e("div", { style:{display:"flex",gap:6} },
              e("button", { style:{...s2.btn(),fontSize:11,padding:"4px 10px"},
                onClick:()=>setFormData(p=>({...p,participants:availableEmps.map(e=>e.name)})) }, tr("select_all")),
              e("button", { style:{...s2.btn(),fontSize:11,padding:"4px 10px"},
                onClick:()=>setFormData(p=>({...p,participants:[]})) }, tr("deselect_all"))
            )
          ),
          e("input", { style:{...s2.input,marginBottom:8}, placeholder:tr("search_participants"),
            value:participantSearch, onChange:ev=>setParticipantSearch(ev.target.value) }),
          e("div", { style:{maxHeight:260,overflowY:"auto",border:"1px solid #334155",borderRadius:8,background:"#0f172a"} },
            ...availableEmps.map(emp =>
              e("div", { key:emp.name, style:{
                display:"flex",alignItems:"center",gap:8,padding:"6px 12px",cursor:"pointer",
                background: formData.participants.includes(emp.name) ? "#1e3a52" : "transparent",
                borderBottom:"1px solid #1e293b", fontSize:13
              },
                onClick:()=>toggleParticipant(emp.name)},
                e("span", { style:{
                  width:14,height:14,borderRadius:3,flexShrink:0,
                  border:"1px solid #475569",
                  background: formData.participants.includes(emp.name) ? "#38bdf8" : "transparent",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#0f172a"
                }}, formData.participants.includes(emp.name) ? "✓" : ""),
                e("span", { style:{flex:1} }, emp.name),
                e("span", { style:{color:"#64748b",fontSize:11} }, emp.working_site || ""),
                e("span", { style:{color:"#94a3b8",fontSize:11} }, emp.state || "")
              )
            )
          )
        ),

        e("div", { style:{display:"flex",gap:8} },
          e("button", { style:s2.btn("success"), onClick:createSchedule }, "✓ " + tr("create_schedule")),
          e("button", { style:s2.btn("danger"), onClick:resetForm }, tr("cancel"))
        )
      ),

      // Upcoming
      upcoming.length > 0 && e("div", { style:{marginBottom:24} },
        e("div", { style:{fontWeight:700,fontSize:14,color:"#22c55e",marginBottom:10} },
          "📅 " + tr("upcoming") + ` (${upcoming.length})`
        ),
        ...upcoming.map(s => e(ScheduleCard, { key:s.id, s }))
      ),

      // Past / completed / cancelled
      past.length > 0 && e("div", null,
        e("div", { style:{fontWeight:700,fontSize:14,color:"#64748b",marginBottom:10} },
          "📁 " + tr("past") + ` (${past.length})`
        ),
        ...past.map(s => e(ScheduleCard, { key:s.id, s }))
      ),

      scheduledTrainings.length === 0 && !showForm && e("div", { style:{...s2.card,color:"#64748b",textAlign:"center",padding:"40px 20px"} },
        tr("no_scheduled")
      )
    );
  }

  // ─ Nav ─
  const navActive = (id) => view===id || (view==="detail" && id==="emps");

  return e("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif",background:"#0f172a",color:"#f1f5f9"}},
    // Header
    e("div",{style:{background:"#1e293b",borderBottom:"1px solid #334155",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,flexWrap:"wrap"}},
      e("div",{style:{fontSize:18,fontWeight:800,color:"#38bdf8"}},"🏗️ TrainingTracker"),
      dbStatus==="connected" && e("span",{style:{fontSize:11,color:"#22c55e",background:"#0d2d1a",border:"1px solid #22c55e",borderRadius:20,padding:"2px 10px"}},
        "● "+tr("online") + (lastSaved ? " · "+new Date(lastSaved).toLocaleTimeString(I18N[CURRENT_LANG].locale,{hour:"2-digit",minute:"2-digit"}) : "")),
      dbStatus==="connecting" && e("span",{style:{fontSize:11,color:"#38bdf8",background:"#0f2744",border:"1px solid #38bdf8",borderRadius:20,padding:"2px 10px"}},tr("connecting")),
      dbStatus==="saving" && e("span",{style:{fontSize:11,color:"#f59e0b",background:"#2d1a00",border:"1px solid #f59e0b",borderRadius:20,padding:"2px 10px"}},tr("saving")),
      dbStatus==="error" && e("span",{style:{fontSize:11,color:"#ef4444",background:"#2d0a0a",border:"1px solid #ef4444",borderRadius:20,padding:"2px 10px"}},"● "+tr("error_save")),
      dbStatus==="local" && e("span",{style:{fontSize:11,color:"#f59e0b",background:"#2d1a00",border:"1px solid #f59e0b",borderRadius:20,padding:"2px 10px"}},"● "+tr("local")),
      e("button",{
        style:{
          marginLeft:"auto",
          padding:"6px 12px",borderRadius:8,border:"1px solid #334155",
          background:"#0f172a",color:"#94a3b8",cursor:"pointer",
          fontSize:12,fontWeight:600
        },
        onClick:()=>{
          CURRENT_LANG = CURRENT_LANG === "pt" ? "en" : "pt";
          localStorage.setItem("tt_lang", CURRENT_LANG);
          BADGE = makeBadges();
          window.location.reload();
        }
      }, CURRENT_LANG === "pt" ? "🇺🇸 EN" : "🇧🇷 PT"),
      e("nav",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        ...[ ["dashboard",tr("nav_dashboard")], ["bysite",tr("nav_bysite")], ["schedule","📅 "+tr("nav_schedule")], ["emps",tr("nav_emps")], ["alerts",tr("nav_alerts")], ["missing",tr("nav_missing")], ["reports",tr("nav_reports")], ["upload",tr("nav_upload")], ["history",tr("nav_history")] ]
          .map(([id,label])=>e("button",{key:id,
            style:{padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,
              background:navActive(id)?"#38bdf8":"transparent",
              color:navActive(id)?"#0f172a":"#94a3b8"},
            onClick:()=>{setView(id);setSearch("");setEditingEmp(null);}},
            label,
            id==="alerts"&&alerts.length>0&&e("span",{style:{background:"#fee2e2",color:"#991b1b",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700,marginLeft:6}},alerts.length)
          ))
      )
    ),
    // Main content
    e("div",{style:{flex:1,padding:"20px",maxWidth:1300,margin:"0 auto",width:"100%"}},
      view==="dashboard" && Dashboard(),
      view==="bysite" && BySite(),
      view==="schedule" && Schedule(),
      view==="emps" && EmpList(),
      view==="detail" && EmpDetail(),
      view==="alerts" && Alerts(),
      view==="missing" && Missing(),
      view==="reports" && Reports(),
      view==="upload" && Upload(),
      view==="history" && HistoryView()
    )
  );
}

// ── Password Gate ──────────────────────────────────────────────
const APP_PASSWORD = "trainingjka";
const PWD_KEY = "tt_authed_v1";

function PasswordGate() {
  const [pwd, setPwd] = React.useState("");
  const [err, setErr] = React.useState(false);

  function tryLogin() {
    if (pwd === APP_PASSWORD) {
      sessionStorage.setItem(PWD_KEY, "1");
      setAuthed(true);
    } else {
      setErr(true);
      setPwd("");
      setTimeout(() => setErr(false), 1500);
    }
  }

  return React.createElement("div", {
    style: {
      minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif", background:"#0f172a", color:"#f1f5f9"
    }
  },
    React.createElement("div", {
      style: { background:"#1e293b", border:"1px solid #334155", borderRadius:14, padding:"36px 40px", maxWidth:400, width:"90%", boxShadow:"0 20px 60px rgba(0,0,0,0.5)" }
    },
      React.createElement("div", {style:{fontSize:30,marginBottom:12,textAlign:"center"}}, "🏗️"),
      React.createElement("div", {style:{fontSize:22,fontWeight:800,color:"#38bdf8",textAlign:"center",marginBottom:6}}, "TrainingTracker"),
      React.createElement("div", {style:{fontSize:13,color:"#94a3b8",textAlign:"center",marginBottom:24}}, CURRENT_LANG === "en" ? "Enter password to access" : "Digite a senha para acessar"),
      React.createElement("input", {
        type:"password",
        autoFocus:true,
        placeholder:CURRENT_LANG === "en" ? "Password" : "Senha",
        value:pwd,
        onChange:e=>setPwd(e.target.value),
        onKeyDown:e=>{if(e.key==="Enter")tryLogin();},
        style:{
          width:"100%", padding:"12px 16px", borderRadius:10, fontSize:14,
          background:"#0f172a", color:"#f1f5f9", outline:"none",
          border: err ? "1px solid #ef4444" : "1px solid #334155",
          marginBottom:14, boxSizing:"border-box"
        }
      }),
      err && React.createElement("div",{style:{color:"#ef4444",fontSize:12,marginBottom:10,textAlign:"center"}},CURRENT_LANG === "en" ? "❌ Incorrect password" : "❌ Senha incorreta"),
      React.createElement("button", {
        onClick:tryLogin,
        style:{
          width:"100%", padding:"12px", borderRadius:10, border:"none", cursor:"pointer",
          fontWeight:700, fontSize:14, background:"#38bdf8", color:"#0f172a"
        }
      }, CURRENT_LANG === "en" ? "Enter" : "Entrar")
    )
  );
}

let setAuthed;
function Root() {
  const [authed, _setAuthed] = React.useState(sessionStorage.getItem(PWD_KEY) === "1");
  setAuthed = _setAuthed;
  return authed ? React.createElement(App) : React.createElement(PasswordGate);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root));
</script>
</body>
