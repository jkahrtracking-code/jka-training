const GAS_URL = "https://script.google.com/macros/s/AKfycbwReYVEAI6oXRKuFl-BSnsUfQvQCUDvZC9vvDlsLImR7DwqqGqFInq4CTp1uDKjbO0/exec";

function dedupeEmployees(list) {
  const norm = s => String(s).toLowerCase().replace(/\./g,"").replace(/[áàãâ]/g,"a").replace(/[éèê]/g,"e").replace(/[íì]/g,"i").replace(/[óòõô]/g,"o").replace(/[úù]/g,"u").replace(/ç/g,"c").replace(/\s+/g," ").trim();
  // Clean invisible chars / extra spaces from names
  const cleanName = s => String(s||"").replace(/[\u200B-\u200D\uFEFF\u00A0]/g," ").replace(/\s+/g," ").trim();
  list = list.map(emp => ({...emp, name: cleanName(emp.name)}));
  const seen = {}; const out = [];
  for (const emp of list) {
    const k = norm(emp.name||"");
    if (!k) { out.push(emp); continue; }
    if (seen[k] !== undefined) {
      const tgt = out[seen[k]];
      // merge: keep first, fill empty fields, merge trainings & histories
      tgt.trainings = {...(emp.trainings||{}), ...(tgt.trainings||{})};
      const dts = new Set((tgt.daily_history||[]).map(h=>h.date));
      tgt.daily_history = [...(tgt.daily_history||[]), ...((emp.daily_history||[]).filter(h=>!dts.has(h.date)))];
      tgt.site_history = [...(tgt.site_history||[]), ...(emp.site_history||[])];
      for (const [f,v] of Object.entries(emp)) {
        if (["trainings","daily_history","site_history"].includes(f)) continue;
        if ((tgt[f]===undefined||tgt[f]===""||tgt[f]===null) && v) tgt[f]=v;
      }
    } else { seen[k] = out.length; out.push({...emp}); }
  }
  return out;
}

async function dbLoad() {
  try {
    const r = await fetch(`${GAS_URL}?action=load`);
    if (!r.ok) return null;
    const data = await r.json();
    return data;
  } catch(e) { console.error("dbLoad:", e); return null; }
}

async function dbSave(payload, actionLog) {
  try {
    const fd = new FormData();
    fd.append("data", JSON.stringify({ ...payload, action_log: actionLog || "" }));
    const r = await fetch(GAS_URL, { method: "POST", body: fd, redirect: "follow" });
    // Try to read response, but if blocked by CORS just trust the status
    try {
      const txt = await r.text();
      if (txt.includes("ok") || txt.includes("true")) return true;
      const j = JSON.parse(txt);
      return j.ok === true;
    } catch {
      // Response unreadable but request went through
      return r.ok || r.type === "opaqueredirect" || r.status === 0;
    }
  } catch(e) { console.error("dbSave:", e); return false; }
}

async function dbSaveEmployees(employees) {
  return await dbSave({ employees, trainings: [], _ts: Date.now() });
}

let CURRENT_LANG = localStorage.getItem("tt_lang") || "pt";
function tr(key, vars) {
  let str = I18N[CURRENT_LANG][key] || I18N.pt[key] || key;
  if (vars) Object.keys(vars).forEach(k => { str = str.replace(`{${k}}`, vars[k]); });
  return str;
}


function parseDate(s) {
  if (!s) return null;
  try { const d = new Date(s); if (!isNaN(d)) return d; } catch {}
  return null;
}
function daysUntil(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return null;
  return Math.round((d - TODAY) / (1000*60*60*24));
}
// ── Geocoding (OpenStreetMap Nominatim) ──────────────────────────
// Cache addresses to avoid re-querying. Stored in localStorage so it persists.
function loadGeoCache() {
  try { return JSON.parse(localStorage.getItem("tt_geocache") || "{}"); }
  catch { return {}; }
}
function saveGeoCache(cache) {
  try { localStorage.setItem("tt_geocache", JSON.stringify(cache)); } catch {}
}
const GEO_CACHE = loadGeoCache();

async function geocodeAddress(addr) {
  if (!addr) return null;
  const key = addr.trim().toLowerCase();
  if (GEO_CACHE[key]) return GEO_CACHE[key];
  try {
    // Try Nominatim with required User-Agent
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1&addressdetails=1`;
    const r = await fetch(url, {
      headers: {
        "Accept": "application/json",
        "User-Agent": "JKA-Training-Tracker/1.0"
      }
    });
    if (!r.ok) return null;
    const arr = await r.json();
    if (!arr || arr.length === 0) return null;
    const result = { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon) };
    GEO_CACHE[key] = result;
    saveGeoCache(GEO_CACHE);
    return result;
  } catch (e) {
    console.warn("Geocode failed for:", addr, e);
    return null;
  }
}

// Haversine distance in miles
function distanceMiles(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // Earth radius in miles
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function buildEmpAddress(emp) {
  const parts = [];
  if (emp.street) parts.push(emp.street);
  if (emp.city) parts.push(emp.city);
  if (emp.state) parts.push(emp.state);
  if (emp.zip_code) parts.push(emp.zip_code);
  return parts.join(", ");
}

function formatDate(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return "—";
  return d.toLocaleDateString(I18N[CURRENT_LANG].locale, { day:"2-digit", month:"short", year:"numeric" });
}
function expirationStatus(expStr) {
  if (!expStr) return "no-exp";
  const days = daysUntil(expStr);
  if (days === null) return "no-exp";
  if (days < 0) return "expired";
  if (days <= 30) return "expiring";
  return "valid";
}
function pctColor(pct) {
  if (pct >= 80) return "#22c55e";
  if (pct >= 50) return "#f59e0b";
  return "#ef4444";
}

function makeBadges() {
  return {
    expired:  { bg:"#fee2e2", text:"#991b1b", label:tr("expired_badge") },

    "no-exp": { bg:"#1e293b", text:"#64748b", label:tr("no_exp_badge") },
  };
}

function StatusBadge({ status, days }) {
  const c = BADGE[status];
  const label = status === "expiring" && days !== null ? `${days}d` : c.label;
  return React.createElement("span", {
    style: { background:c.bg, color:c.text, borderRadius:6, padding:"2px 8px", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }
  }, label);
}

  // ─ Employee List ─
  function EmpList() {
    const colFilter = empList_colFilter, setColFilter = empList_setColFilter;
    const filterStatusEmp = empList_filterStatus, setFilterStatusEmp = empList_setFilterStatus;
    const openMenu = empList_openMenu, setOpenMenu = empList_setOpenMenu;
    const visibleCols = empList_visibleCols, setVisibleCols = empList_setVisibleCols;
    const showColMenu = empList_showColMenu, setShowColMenu = empList_setShowColMenu;
    const sortCol = empList_sortCol, setSortCol = empList_setSortCol;
    const sortDir = empList_sortDir, setSortDir = empList_setSortDir;

    const allStatuses = (() => [...new Set(employees.map(e=>e.contract_status).filter(Boolean))].sort())();
    const allSites = (() => [...new Set(employees.map(e=>e.working_site).filter(s=>s&&s!=="NOT FOUND"))].sort())();
    const allTitles = (() => [...new Set(employees.map(e=>e.job_title).filter(Boolean))].sort())();
    const allStates = (() => [...new Set(employees.map(e=>e.state).filter(Boolean))].sort())();
    const allTypes = (() => [...new Set(employees.map(e=>e.type).filter(Boolean))].sort())();
    const allOrigins = (() => [...new Set(employees.map(e=>e.origin).filter(Boolean))].sort())();
    const allScopes = (() => [...new Set(employees.flatMap(e=>(e.scopes||"").split(/[;,]/).map(s=>s.trim())).filter(Boolean))].sort())();

    // All available columns
    const ALL_COLUMNS = [
      { id:"name", label:tr("col_name"), required:true, render:emp => e("span",{style:{fontWeight:600,color:"#38bdf8",cursor:"pointer"},onClick:()=>openEmp(emp)},emp.name) },
      { id:"contract_status", label:tr("col_status"), filterable:true, render:emp => e("span",{style:s.tag(emp.contract_status==="ACTIVE")},emp.contract_status||"—") },
      { id:"type", label:tr("f_type"), filterable:true, render:emp => emp.type || "—" },
      { id:"origin", label:tr("f_origin"), filterable:true, render:emp => emp.origin || "—" },
      { id:"job_title", label:tr("col_role"), filterable:true, render:emp => emp.job_title || "—" },
      { id:"position", label:tr("f_position"), render:emp => emp.position || "—" },
      { id:"scopes", label:tr("f_scopes"), render:emp => emp.scopes || "—" },
      { id:"working_site", label:tr("col_location"), filterable:true, render:emp => currentSite(emp) || "—" },
      { id:"state", label:tr("col_state"), filterable:true, render:emp => emp.state || "—" },
      { id:"city", label:tr("f_city"), render:emp => emp.city || "—" },
      { id:"street", label:tr("f_street"), render:emp => emp.street || "—" },
      { id:"zip_code", label:tr("f_zip"), render:emp => emp.zip_code || "—" },
      { id:"phone", label:tr("f_phone"), render:emp => emp.phone || "—" },
      { id:"email", label:tr("f_email"), render:emp => emp.email || "—" },
      { id:"union_number", label:tr("f_union_n"), render:emp => emp.union_number || "—" },
      { id:"payroll_code", label:tr("f_payroll"), render:emp => emp.payroll_code || "—" },
      { id:"ssn", label:tr("f_ssn"), render:emp => emp.ssn || "—" },
      { id:"dob", label:tr("f_dob"), render:emp => emp.dob || "—" },
      { id:"gender", label:tr("f_gender"), render:emp => emp.gender || "—" },
      { id:"hire_date", label:tr("f_hire_date"), render:emp => emp.hire_date || "—" },
      { id:"lay_off_date", label:tr("f_layoff_date"), render:emp => emp.lay_off_date || "—" },
      { id:"rehire_date", label:tr("f_rehire_date"), render:emp => emp.rehire_date || "—" },
      { id:"language", label:tr("f_language"), render:emp => emp.language || "—" },
      { id:"race", label:tr("f_race"), render:emp => emp.race || "—" },
      { id:"minority", label:tr("f_minority"), render:emp => emp.minority || "—" },
      { id:"salary_z1c", label:tr("f_salary_z1c"), render:emp => emp.salary_z1c ? "$"+emp.salary_z1c : "—" },
      { id:"salary_z1", label:tr("f_salary_z1"), render:emp => emp.salary_z1 ? "$"+emp.salary_z1 : "—" },
      { id:"salary_z2", label:tr("f_salary_z2"), render:emp => emp.salary_z2 ? "$"+emp.salary_z2 : "—" },
      { id:"salary_z3", label:tr("f_salary_z3"), render:emp => emp.salary_z3 ? "$"+emp.salary_z3 : "—" },
      { id:"salary_eastern", label:tr("f_salary_eastern"), render:emp => emp.salary_eastern ? "$"+emp.salary_eastern : "—" },
      { id:"salary_ny", label:tr("f_salary_ny"), render:emp => emp.salary_ny ? "$"+emp.salary_ny : "—" },
      { id:"last_salary_update", label:tr("f_last_salary_update"), render:emp => emp.last_salary_update || "—" },
      { id:"trainings_count", label:tr("col_trainings"), render:emp => Object.keys(emp.trainings||{}).length },
      { id:"alerts_count", label:tr("col_alerts"), render:emp => {
          const cnt = Object.entries(emp.trainings||{}).filter(([,v])=>["expired","expiring"].includes(expirationStatus(v.expiration))).length;
          return cnt > 0 ? e("span",{style:s.red},cnt) : e("span",{style:{color:"#334155"}},"—");
        }},
      { id:"obs", label:tr("f_obs"), render:emp => (emp.obs||"").substring(0,50) || "—" },
    ];

    // Build dropdown options for filterable columns
    const SKIP_COL_FILTER = new Set(["name","trainings_count","alerts_count","ssn","dob","obs","street","email","phone","payroll_code","union_number","zip_code"]);
    const colOptions = {};
    ALL_COLUMNS.forEach(col => {
      if (SKIP_COL_FILTER.has(col.id)) return;
      let vals;
      if (col.id === "scopes") {
        // Scopes is comma-separated — explode into individual values
        vals = [...new Set(employees.flatMap(emp => (emp.scopes||"").split(",").map(s=>s.trim())).filter(v=>v&&v!=="—"&&v!==""))].sort();
      } else if (col.id === "working_site") {
        vals = [...new Set(employees.map(emp => currentSite(emp)).filter(v => v && v !== "—" && v !== "#N/A" && v !== "NOT FOUND"))].sort();
      } else {
        vals = [...new Set(employees.map(emp => String(emp[col.id]||"").trim()).filter(v => v && v !== "—" && v !== "#N/A" && v !== ""))].sort();
      }
      if (vals.length > 0 && vals.length <= 300) colOptions[col.id] = vals;
    });

    function toggleColVal(col, val) {
      setColFilter(prev => {
        const cur = prev[col] || [];
        const next = cur.includes(val) ? cur.filter(x=>x!==val) : [...cur, val];
        if (next.length===0) { const n={...prev}; delete n[col]; return n; }
        return {...prev, [col]: next};
      });
    }
    function clearCol(col) { setColFilter(prev=>{ const n={...prev}; delete n[col]; return n; }); }

    function toggleVisibleCol(colId) {
      setVisibleCols(prev => {
        const next = prev.includes(colId) ? prev.filter(c=>c!==colId) : [...prev, colId];
        localStorage.setItem("tt_visible_cols", JSON.stringify(next));
        return next;
      });
    }

    function resetCols() {
      setVisibleCols(["name","contract_status","working_site","job_title","state","trainings_count","alerts_count"]);
    }

    const activeColFilters = Object.keys(colFilter).filter(k=>colFilter[k]?.length>0);

    const filtered = (() => {
      let list = employees;
      if (search) { 
        const q=search.toLowerCase(); 
        list=list.filter(e =>
          e.name.toLowerCase().includes(q) ||
          (e.working_site||"").toLowerCase().includes(q) ||
          (e.email||"").toLowerCase().includes(q) ||
          (e.phone||"").toLowerCase().includes(q) ||
          (e.city||"").toLowerCase().includes(q) ||
          (e.union_number||"").toLowerCase().includes(q) ||
          (e.payroll_code||"").toLowerCase().includes(q)
        );
      }
      if (filterStatusEmp!=="ALL") list=list.filter(e=>e.contract_status===filterStatusEmp);
      if (filterTraining!=="ALL") list=list.filter(e=>e.trainings?.[filterTraining]);
      for (const [col, vals] of Object.entries(colFilter)) {
        if (vals.length === 0) continue;
        if (col === "scopes") {
          // scopes is comma-separated — match if any selected scope appears in employee's scopes
          list = list.filter(e => {
            const empScopes = (e.scopes||"").split(",").map(s=>s.trim());
            return vals.some(v => empScopes.includes(v));
          });
        } else if (col === "working_site") {
          list = list.filter(e => vals.includes(currentSite(e)));
        } else {
          list = list.filter(e => vals.includes(String(e[col]||"").trim()));
        }
      }
      // Sorting (Excel-like A→Z / Z→A)
      if (sortCol) {
        const getVal = emp => {
          if (sortCol === "working_site") return currentSite(emp) || "";
          if (sortCol === "trainings_count") return Object.keys(emp.trainings||{}).length;
          return String(emp[sortCol] ?? "").replace(/[\u200B-\u200D\uFEFF\u00A0]/g," ").trim();
        };
        list = [...list].sort((a,b) => {
          const va = getVal(a), vb = getVal(b);
          const cmp = typeof va === "number" && typeof vb === "number"
            ? va - vb
            : String(va).localeCompare(String(vb), undefined, {numeric:true, sensitivity:"base"});
          return sortDir === "asc" ? cmp : -cmp;
        });
      }
      return list;
    })();

    // Visible columns in order
    const cols = ALL_COLUMNS.filter(c => visibleCols.includes(c.id) || c.required);

    function exportCSV() {
      const headers = cols.map(c => c.label).concat(["Actions"]);
      const rows = filtered.map(emp => 
        cols.map(c => {
          // Get raw value, not rendered React element
          const raw = emp[c.id];
          if (c.id === "trainings_count") return Object.keys(emp.trainings||{}).length;
          if (c.id === "alerts_count") return Object.entries(emp.trainings||{}).filter(([,v])=>["expired","expiring"].includes(expirationStatus(v.expiration))).length;
          return raw || "";
        })
      );
      let csv = headers.slice(0, -1).join(",") + "\n";
      csv += rows.map(r => r.map(v => {
        const s = String(v).replace(/"/g, '""');
        return s.includes(",") || s.includes("\n") || s.includes('"') ? `"${s}"` : s;
      }).join(",")).join("\n");
      
      const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "employees_" + new Date().toISOString().slice(0,10) + ".csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    function ColHeader({ label, col }) {

      const isOpen = openMenu === col;
      const isSorted = sortCol === col;

              borderRadius: 3, padding: "1px 3px",
              border: hasFilter ? "1px solid #38bdf8" : "1px solid #475569",
            }
          }, (isSorted ? (sortDir==="asc"?"↑":"↓")+" " : "") + (hasFilter ? `▼ ${colFilter[col].length}` : "▼"))
        ),
        isOpen && e("div", {
          style: {
            position:"absolute", top:"100%", left:0, zIndex:200,
            background:"#1e293b", border:"1px solid #475569", borderRadius:8,
            minWidth:180, maxHeight:260, overflowY:"auto",
            boxShadow:"0 8px 24px rgba(0,0,0,0.5)", padding:"6px 0"
          },
          onClick: ev => ev.stopPropagation()
        },
          e("div", { style:{padding:"6px 12px",borderBottom:"1px solid #334155",display:"flex",justifyContent:"space-between",alignItems:"center"} },
            e("span",{style:{fontSize:12,color:"#94a3b8",fontWeight:600}},label),
            hasFilter && e("button",{style:{...s.btn("danger"),padding:"2px 8px",fontSize:11},onClick:()=>clearCol(col)},"Limpar")
          ),
          // Sort options (Excel-like)
          e("div",{style:{padding:"4px 12px",cursor:"pointer",fontSize:13,display:"flex",gap:8,alignItems:"center",
            color:(isSorted&&sortDir==="asc")?"#38bdf8":"#e2e8f0",fontWeight:(isSorted&&sortDir==="asc")?700:400},
            onMouseEnter:ev=>ev.currentTarget.style.background="#263348",
            onMouseLeave:ev=>ev.currentTarget.style.background="transparent",
            onClick:()=>{ if(isSorted&&sortDir==="asc"){setSortCol(null);}else{setSortCol(col);setSortDir("asc");} setOpenMenu(null); }
          }, "↑ Ordenar A → Z"),
          e("div",{style:{padding:"4px 12px",cursor:"pointer",fontSize:13,display:"flex",gap:8,alignItems:"center",
            borderBottom: opts.length>0 ? "1px solid #334155" : "none", paddingBottom:8, marginBottom: opts.length>0 ? 4 : 0,
            color:(isSorted&&sortDir==="desc")?"#38bdf8":"#e2e8f0",fontWeight:(isSorted&&sortDir==="desc")?700:400},
            onMouseEnter:ev=>ev.currentTarget.style.background="#263348",
            onMouseLeave:ev=>ev.currentTarget.style.background="transparent",
            onClick:()=>{ if(isSorted&&sortDir==="desc"){setSortCol(null);}else{setSortCol(col);setSortDir("desc");} setOpenMenu(null); }
          }, "↓ Ordenar Z → A"),
          ...opts.map(opt =>
            e("div", {
              key: opt,
              style: {
                display:"flex", alignItems:"center", gap:8,
                padding:"6px 12px", cursor:"pointer", fontSize:13,
                background: colFilter[col]?.includes(opt) ? "#1e3a52" : "transparent",
              },
              onMouseEnter: ev=>ev.currentTarget.style.background="#263348",
              onMouseLeave: ev=>ev.currentTarget.style.background=colFilter[col]?.includes(opt)?"#1e3a52":"transparent",
              onClick: () => toggleColVal(col, opt)
            },
              e("span",{style:{
                width:14,height:14,borderRadius:3,flexShrink:0,
                border:"1px solid #475569",
                background: colFilter[col]?.includes(opt) ? "#38bdf8" : "transparent",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#0f172a"
              }}, colFilter[col]?.includes(opt) ? "✓" : ""),
              e("span",{style:{color: opt==="ACTIVE"?"#22c55e":opt==="INACTIVE"?"#94a3b8":"#e2e8f0"}}, opt||"—")
            )
          )
        )
      );
    }

    return e("div", { style:{position:"relative"}, onClick:()=>{setOpenMenu(null); setShowColMenu(false);} },
      e("div",{style:s.row},
        e("input",{style:{...s.input,flex:1,minWidth:180},placeholder:tr("search_placeholder"),value:search,onChange:ev=>setSearch(ev.target.value)}),
        e("select",{style:{...s.sel,maxWidth:260},value:filterTraining,onChange:ev=>setFilterTraining(ev.target.value)},
          e("option",{value:"ALL"},tr("all_trainings")),
          ...trainings.map(t=>e("option",{key:t,value:t},t))
        ),
        // Status filter buttons
        ...["ALL","ACTIVE","INACTIVE"].map(v=>e("button",{key:v,
          style:{padding:"6px 14px",borderRadius:20,border:filterStatusEmp===v?"none":"1px solid #334155",

              e("div",{style:{display:"flex",gap:6}},

        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},

  // ─ Upload ─
  function Upload() {
    const dragOver = upload_dragOver, setDragOver = upload_setDragOver;
    const results = upload_results, setResults = upload_setResults;
    const processing = upload_processing, setProcessing = upload_setProcessing;

    function parseExcelDate(val) {
      if (!val) return null;
      if (val instanceof Date) return val.toISOString().slice(0,10);
      if (typeof val === "number") {
        // Excel serial date
        const d = new Date(Math.round((val - 25569) * 86400 * 1000));
        return d.toISOString().slice(0,10);
      }
      const s = String(val).trim();
      if (!s || s==="NaN" || s.toUpperCase()==="NAN") return null;
      const d = new Date(s);
      return isNaN(d) ? null : d.toISOString().slice(0,10);
    }

    async function processFile(file) {
      setProcessing(true);
      setResults(null);
      try {
        let XLSX = window.XLSX;
        if (!XLSX) {
          await new Promise((res,rej)=>{const sc=document.createElement("script");sc.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);});
          XLSX = window.XLSX;
        }
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type:"array", cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval:null });

        const added = [], updated = [], duplicates = [], skipped = [];

        // Map of known profile column headers -> employee field
        const FIELD_MAP = {
          "name":"name","nome":"name",
          "origin":"origin","origem":"origin",
          "payroll":"payroll_code","payroll code":"payroll_code","codigo payroll":"payroll_code","código payroll":"payroll_code","payroll_code":"payroll_code","pr#":"payroll_code",
          "ssn":"ssn","ssn/itin":"ssn","itin":"ssn",
          "u#":"union_number","union":"union_number","union number":"union_number","union_number":"union_number","u# union":"union_number",
          "dob":"dob","data de nascimento":"dob","birth":"dob","birth date":"dob","nascimento":"dob",
          "gender":"gender","genero":"gender","gênero":"gender","sexo":"gender",
          "type":"type","tipo":"type",
          "contract status":"contract_status","status":"contract_status","contract_status":"contract_status",
          "hire date":"hire_date","hire_date":"hire_date","admissao":"hire_date","admissão":"hire_date","data de admissao":"hire_date","data de admissão":"hire_date",
          "lay off date":"lay_off_date","layoff date":"lay_off_date","lay_off_date":"lay_off_date","exit date":"lay_off_date","data de saida":"lay_off_date","data de saída":"lay_off_date","demissao":"lay_off_date","demissão":"lay_off_date",
          "rehire date":"rehire_date","rehire_date":"rehire_date","recontratacao":"rehire_date","recontratação":"rehire_date",
          "phone":"phone","telefone":"phone","celular":"phone","cell":"phone",
          "email":"email","e-mail":"email",
          "street":"street","address":"street","endereco":"street","endereço":"street","rua":"street",
          "city":"city","cidade":"city",
          "state":"state","uf":"state","estado":"state",
          "zip":"zip_code","zip code":"zip_code","zip_code":"zip_code","cep":"zip_code",
          "scopes":"scopes","especialidades":"scopes","scope":"scopes",
          "union job title":"job_title","job title":"job_title","job_title":"job_title","cargo":"job_title",
          "position":"position","posicao":"position","posição":"position","posicao/cargo":"position","posição/cargo":"position",
          "language":"language","idioma":"language",
          "salary z1c":"salary_z1c","salary_z1c":"salary_z1c","z1c":"salary_z1c","z1 c":"salary_z1c",
          "salary z1":"salary_z1","salary_z1":"salary_z1","z1":"salary_z1",
          "salary z2":"salary_z2","salary_z2":"salary_z2","z2":"salary_z2",
          "salary z3":"salary_z3","salary_z3":"salary_z3","z3":"salary_z3",
          "salary eastern":"salary_eastern","salary_eastern":"salary_eastern","eastern":"salary_eastern",
          "salary ny":"salary_ny","salary_ny":"salary_ny","ny salary":"salary_ny",
          "last salary update":"last_salary_update","last_salary_update":"last_salary_update",
          "race":"race","raca":"race","raça":"race",
          "minority":"minority","minoria":"minority",
          "qualitative":"qualitative","qualitativo":"qualitative",
          "working site":"working_site","working_site":"working_site","local":"working_site","obra":"working_site","site":"working_site","project":"working_site",
          "obs":"obs","observacao":"obs","observação":"obs","notes":"obs",
          "exit reason":"exit_reason","exit_reason":"exit_reason","motivo de saida":"exit_reason","motivo de saída":"exit_reason"
        };
        const DATE_FIELDS = new Set(["dob","hire_date","lay_off_date","rehire_date","last_salary_update"]);
        const IGNORE_COLS = new Set(["issued","expiration","date","data","workers"]);

        function fmtProfileDate(val) {
          // Keep MM/DD/YYYY format to match existing data
          if (val == null || val === "") return "";
          if (typeof val === "number") {
            const d = new Date(Math.round((val - 25569) * 86400 * 1000));
            return (d.getUTCMonth()+1)+"/"+d.getUTCDate()+"/"+d.getUTCFullYear();
          }
          if (val instanceof Date && !isNaN(val)) {
            return (val.getMonth()+1)+"/"+val.getDate()+"/"+val.getFullYear();
          }
          return String(val).trim();
        }

        for (const row of rows) {
          const name = String(row["Name"] || row["name"] || row["NOME"] || row["Nome"] || "").trim();
          if (!name) { skipped.push("(linha sem nome)"); continue; }

          const profile = {};
          const newTrainings = {};
          for (const [k,v] of Object.entries(row)) {
            const keyRaw = String(k).trim();
            const keyLower = keyRaw.toLowerCase();
            if (keyLower === "name" || keyLower === "nome") continue;
            if (IGNORE_COLS.has(keyLower)) continue;
            const field = FIELD_MAP[keyLower];
            if (field) {
              // Known profile field
              if (v != null && String(v).trim() !== "" && String(v).trim() !== "null") {
                profile[field] = DATE_FIELDS.has(field) ? fmtProfileDate(v) : String(v).trim();
              }
            } else {
              // Unknown column = training name
              if (v && String(v).trim() && String(v).trim() !== "null") {
                newTrainings[keyRaw] = { issued: parseExcelDate(v), expiration: null };
              }
            }
          }

          const normN = s => String(s).toLowerCase().replace(/\./g,"").replace(/[áàãâ]/g,"a").replace(/[éèê]/g,"e").replace(/[íì]/g,"i").replace(/[óòõô]/g,"o").replace(/[úù]/g,"u").replace(/ç/g,"c").replace(/\s+/g," ").trim();
          // Skip if already added in this same spreadsheet (internal duplicate)
          if (added.find(a => normN(a.name) === normN(name))) { duplicates.push(name+" (repetido na planilha)"); continue; }
          const existing = employees.find(e => normN(e.name) === normN(name));
          if (existing) {
            const newKeys = Object.keys(newTrainings).filter(t => !existing.trainings?.[t]);
            if (newKeys.length > 0) {
              updated.push({ name, newTrainings: Object.fromEntries(newKeys.map(t=>[t,newTrainings[t]])) });
            } else {
              duplicates.push(name);
            }
          } else {
            added.push({
              ...profile,
              name,
              contract_status: profile.contract_status || "ACTIVE",
              trainings: newTrainings
            });
          }
        }
        setResults({ added, updated, duplicates, skipped });

      } catch(err) {
        setResults({ error: String(err) });
      }
      setProcessing(false);
    }

    function applyImport() {
      if (!results) return;
      setEmployees(prev => {
        let list = [...prev];
        // Add new
        for (const emp of results.added) list = [emp, ...list];
        // Update existing with new trainings
        for (const upd of results.updated) {
          list = list.map(e => e.name.toLowerCase()===upd.name.toLowerCase()
            ? {...e, trainings:{...e.trainings,...upd.newTrainings}} : e);
        }
        return list;
      });
      setResults(null);
      setView("emps");
    }

    function onDrop(ev) {
      ev.preventDefault(); setDragOver(false);
      const file = ev.dataTransfer.files[0];
      if (file) processFile(file);
    }

    return e("div",null,
      e("h2",{style:s.h2},tr("upload_title")),
      e("div",{style:{...s.card,marginBottom:16}},
        e("div",{style:{fontWeight:600,marginBottom:8}},"Como funciona"),
        e("div",{style:{color:"#94a3b8",fontSize:13,lineHeight:1.7}},
          "• O app lê a primeira aba do arquivo .xlsx",e("br"),
          "• Coluna ",e("strong",{style:{color:"#e2e8f0"}},"Name"),": nome do funcionário (obrigatório)",e("br"),
          "• Colunas opcionais: Working Site, Contract Status, U#, Union Job Title, State",e("br"),
          "• Demais colunas são tratadas como treinamentos (com a data como valor)",e("br"),
          "• Funcionários já existentes: apenas os treinamentos novos são adicionados",e("br"),
          "• Funcionários duplicados (mesmo nome, mesmos dados): ignorados com aviso"
        )
      ),

      // Drop zone
      e("div",{
        style:{
          border:`2px dashed ${dragOver?"#38bdf8":"#334155"}`,
          borderRadius:12, padding:"40px 20px", textAlign:"center",
          background: dragOver?"#0f2744":"#1e293b",
          cursor:"pointer", marginBottom:16, transition:"all 0.2s"
        },
        onDragOver:ev=>{ev.preventDefault();setDragOver(true)},
        onDragLeave:()=>setDragOver(false),
        onDrop,
        onClick:()=>document.getElementById("xl-upload").click()
      },
        e("div",{style:{fontSize:32,marginBottom:8}},"📄"),
        e("div",{style:{fontWeight:700,fontSize:15,color:dragOver?"#38bdf8":"#e2e8f0"}},
          processing ? "Processando..." : "Arraste um arquivo .xlsx aqui ou clique para selecionar"
        ),
        e("div",{style:{color:"#64748b",fontSize:12,marginTop:4}},"Suporta .xlsx e .xls"),
        e("input",{id:"xl-upload",type:"file",accept:".xlsx,.xls",style:{display:"none"},
          onChange:ev=>{const f=ev.target.files[0];if(f)processFile(f);}})
      ),

      // Results
      results && !results.error && e("div",null,
        // Summary chips
        e("div",{style:{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}},
          e("div",{style:{background:"#1e293b",border:"1px solid #22c55e",borderRadius:10,padding:"10px 18px",textAlign:"center"}},
            e("div",{style:{fontSize:24,fontWeight:800,color:"#22c55e"}},results.added.length),
            e("div",{style:{fontSize:12,color:"#94a3b8",marginTop:2}},"Novos funcionários")
          ),
          e("div",{style:{background:"#1e293b",border:"1px solid #38bdf8",borderRadius:10,padding:"10px 18px",textAlign:"center"}},
            e("div",{style:{fontSize:24,fontWeight:800,color:"#38bdf8"}},results.updated.length),
            e("div",{style:{fontSize:12,color:"#94a3b8",marginTop:2}},"Com treinamentos novos")
          ),
          e("div",{style:{background:"#1e293b",border:"1px solid #f59e0b",borderRadius:10,padding:"10px 18px",textAlign:"center"}},
            e("div",{style:{fontSize:24,fontWeight:800,color:"#f59e0b"}},results.duplicates.length),
            e("div",{style:{fontSize:12,color:"#94a3b8",marginTop:2}},"Duplicatas (ignoradas)")
          ),
          e("div",{style:{background:"#1e293b",border:"1px solid #475569",borderRadius:10,padding:"10px 18px",textAlign:"center"}},
            e("div",{style:{fontSize:24,fontWeight:800,color:"#64748b"}},results.skipped.length),
            e("div",{style:{fontSize:12,color:"#94a3b8",marginTop:2}},"Linhas sem nome")
          )
        ),

        // Detail tables
        results.added.length>0 && e("div",{style:{...s.card,marginBottom:12}},
          e("div",{style:{fontWeight:700,color:"#22c55e",marginBottom:8}},`✅ ${results.added.length} novos funcionários`),
          e("div",{style:{maxHeight:180,overflowY:"auto"}},
            ...results.added.map((emp,i)=>e("div",{key:i,style:{padding:"5px 0",borderBottom:"1px solid #334155",fontSize:13,display:"flex",justifyContent:"space-between"}},
              e("span",{style:{fontWeight:600}},emp.name),
              e("span",{style:{color:"#64748b"}},`${Object.keys(emp.trainings).length} treinamentos`)
            ))
          )
        ),

        results.updated.length>0 && e("div",{style:{...s.card,marginBottom:12}},
          e("div",{style:{fontWeight:700,color:"#38bdf8",marginBottom:8}},`🔄 ${results.updated.length} funcionários com treinamentos novos`),
          e("div",{style:{maxHeight:180,overflowY:"auto"}},
            ...results.updated.map((upd,i)=>e("div",{key:i,style:{padding:"5px 0",borderBottom:"1px solid #334155",fontSize:13,display:"flex",justifyContent:"space-between"}},
              e("span",{style:{fontWeight:600}},upd.name),
              e("span",{style:{color:"#38bdf8"}},`+${Object.keys(upd.newTrainings).length} novos`)
            ))
          )
        ),

        results.duplicates.length>0 && e("div",{style:{...s.card,marginBottom:12}},
          e("div",{style:{fontWeight:700,color:"#f59e0b",marginBottom:8}},`⚠️ ${results.duplicates.length} duplicatas ignoradas`),
          e("div",{style:{maxHeight:120,overflowY:"auto",color:"#94a3b8",fontSize:13}},
            results.duplicates.map((n,i)=>e("div",{key:i,style:{padding:"3px 0"}},n))
          )
        ),

        // Action buttons
        (results.added.length>0||results.updated.length>0) && e("div",{style:{display:"flex",gap:10,marginTop:4}},
          e("button",{style:s.btn("success"),onClick:applyImport},"✓ Confirmar Importação"),
          e("button",{style:s.btn("danger"),onClick:()=>setResults(null)},tr("cancel"))
        ),
        results.added.length===0&&results.updated.length===0 && e("div",{style:{color:"#f59e0b",marginTop:4}},
          "Nenhum dado novo encontrado no arquivo."
        )
      ),

      results?.error && e("div",{style:{...s.card,border:"1px solid #ef4444",color:"#ef4444"}},
        "Erro ao ler o arquivo: ", results.error
      )
    );
  }

  function HistoryView() {
    const history = hist_history, setHistory = hist_setHistory;

    if (!window._historyLoaded) {
      window._historyLoaded = true;
      dbLoad().then(data => {
        if (data?.history?.length) setHistory(data.history);
        else loadLocal();
      });

    function loadLocal() {
      try {
        const h = JSON.parse(localStorage.getItem("tt_history")||"[]");

      } catch {}

    function formatTime(iso) {
      if (!iso) return "—";

      return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    }

  // ─ Por Obra/Local ─
  function BySite() {
    const selectedSite = bysite_selected, setSelectedSite = bysite_setSelected;
    const sites = (() => {
      const set = new Map();
      employees.filter(e=>e.contract_status==="ACTIVE").forEach(emp=>{
        const site = currentSite(emp) || tr("no_site");
        if (!set.has(site)) set.set(site, []);
        set.get(site).push(emp);
      });
      return Array.from(set.entries())
        .map(([name, emps]) => ({ name, employees: emps, count: emps.length }))
        .sort((a,b) => b.count - a.count);
    })();

    function siteStats(siteEmps) {
      const total = siteEmps.length;
      if (!total) return { overall:0, courses:[], alerts:0 };
      const courses = MANDATORY.map(t => {
        const count = siteEmps.filter(e => e.trainings?.[t]).length;
        const pct = Math.round(count / total * 100);
        return { name:t, count, pct, total };
      });
      const overall = Math.round(courses.reduce((a,c)=>a+c.pct, 0) / courses.length);
      let alertsCount = 0;
      for (const emp of siteEmps) {
        for (const [t, v] of Object.entries(emp.trainings||{})) {
          const st = expirationStatus(v.expiration);
          if (st === "expired" || st === "expiring") alertsCount++;
        }
      }
      return { overall, courses, alerts: alertsCount };
    }

    return e("div",null,
      e("h2",{style:s.h2},tr("bysite_title")),
      e("div",{style:{color:"#64748b",fontSize:12,marginBottom:14}},
        `${sites.length} ${tr("bysite_desc")}`
      ),

      // Grid of site cards
      selectedSite === "ALL" 
        ? e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}},
            ...sites.map(site => {
              const stats = siteStats(site.employees);
              return e("div",{key:site.name,
                style:{...s.card,marginBottom:0,cursor:"pointer",transition:"transform 0.15s,border-color 0.15s"},
                onMouseEnter:ev=>{ev.currentTarget.style.borderColor="#38bdf8";ev.currentTarget.style.transform="translateY(-2px)"},
                onMouseLeave:ev=>{ev.currentTarget.style.borderColor="#334155";ev.currentTarget.style.transform="translateY(0)"},
                onClick:()=>setSelectedSite(site.name)
              },
                e("div",{style:{fontWeight:700,fontSize:15,marginBottom:4,color:"#e2e8f0"}},site.name),
                e("div",{style:{fontSize:12,color:"#64748b",marginBottom:14}},`${site.count} ${tr("active_emps").toLowerCase()}`),
                e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
                  e("span",{style:{color:"#94a3b8",fontSize:13}},tr("completion_mandatory_label")),

  // ─ Relatórios PDF ─
  // ─ Reports (personalizáveis com período) ─
  function Reports() {
    const generating = reports_generating, setGenerating = reports_setGenerating;
    const reportType = reports_type, setReportType = reports_setType;
    const fromMonth = reports_fromMonth, setFromMonth = reports_setFromMonth;
    const fromYear = reports_fromYear, setFromYear = reports_setFromYear;
    const toMonth = reports_toMonth, setToMonth = reports_setToMonth;
    const toYear = reports_toYear, setToYear = reports_setToYear;
    const repSite = reports_site, setRepSite = reports_setSite;
    const repState = reports_state, setRepState = reports_setState;

    const months = ["01","02","03","04","05","06","07","08","09","10","11","12"];
    const monthNames = CURRENT_LANG==="en"
      ? ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
      : ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const years = Array.from({length:8},(_,i)=>new Date().getFullYear()-i);

    const fromDate = new Date(fromYear, parseInt(fromMonth)-1, 1);
    const toDate = new Date(toYear, parseInt(toMonth), 0, 23, 59, 59);

    function parseD(s){ if(!s)return null; const str=String(s).trim();
      let m=str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); if(m)return new Date(+m[3],+m[1]-1,+m[2]);
      m=str.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m)return new Date(+m[1],+m[2]-1,+m[3]);
      const d=new Date(str); return isNaN(d)?null:d; }

    // Available filter options
    const allSites = ["ALL", ...[...new Set(employees.map(e=>currentSite(e)).filter(x=>x&&x!=="NOT FOUND"))].sort()];
    const allStates = ["ALL", ...[...new Set(employees.map(e=>(e.state||"").toUpperCase()).filter(Boolean))].sort()];

    function applyEmpFilters(list) {
      return list.filter(e=>{
        if (repSite!=="ALL" && currentSite(e)!==repSite) return false;
        if (repState!=="ALL" && (e.state||"").toUpperCase()!==repState) return false;
        return true;
      });
    }

    async function ensureXLSX() {
      if (window.XLSX) return window.XLSX;
      await new Promise((res,rej)=>{const sc=document.createElement("script");sc.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);});
      return window.XLSX;
    }

    function periodLabel() {
      return monthNames[parseInt(fromMonth)-1]+"/"+fromYear+" → "+monthNames[parseInt(toMonth)-1]+"/"+toYear;
    }
    function fileSuffix() {
      let s = fromYear+"-"+fromMonth+"_"+toYear+"-"+toMonth;
      if (repSite!=="ALL") s += "_"+repSite.replace(/[^a-zA-Z0-9]/g,"");
      if (repState!=="ALL") s += "_"+repState;
      return s;
    }

    // ===== REPORT GENERATORS =====
    async function genComplianceBySite() {
      setGenerating(true);
      const XLSX = await ensureXLSX();
      const active = applyEmpFilters(employees.filter(e=>e.contract_status==="ACTIVE"));
      const bySite = {};
      active.forEach(e=>{ const s=currentSite(e)||"(Sem obra)"; (bySite[s]=bySite[s]||[]).push(e); });
      const rows = [["Obra","Funcionários", ...MANDATORY, "Conclusão %"]];
      Object.entries(bySite).sort((a,b)=>b[1].length-a[1].length).forEach(([site,emps])=>{
        const total = emps.length;
        const counts = MANDATORY.map(t=>emps.filter(e=>e.trainings?.[t]).length);
        const pcts = counts.map(c=>total?Math.round(c/total*100):0);
        const overall = Math.round(pcts.reduce((a,b)=>a+b,0)/MANDATORY.length);
        rows.push([site, total, ...counts.map((c,i)=>c+"/"+total+" ("+pcts[i]+"%)"), overall+"%"]);
      });
      const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"]=[{wch:28},{wch:14},...MANDATORY.map(()=>({wch:18})),{wch:12}];
      XLSX.utils.book_append_sheet(wb,ws,"Compliance");
      XLSX.writeFile(wb,"compliance_por_obra_"+fileSuffix()+".xlsx");
      setGenerating(false);
    }

    async function genExpirations() {
      setGenerating(true);
      const XLSX = await ensureXLSX();
      const active = applyEmpFilters(employees.filter(e=>e.contract_status==="ACTIVE"));
      const rows = [["Funcionário","Obra","Curso","Vencimento","Status","Dias restantes"]];
      const now = new Date();
      active.forEach(e=>{
        for (const [t,v] of Object.entries(e.trainings||{})) {
          if (!v?.expiration) continue;
          const exp = parseD(v.expiration); if (!exp) continue;
          const days = Math.round((exp-now)/(1000*60*60*24));
          let status = days<0?"VENCIDO":days<=30?"Vence em 30d":days<=60?"Vence em 60d":days<=90?"Vence em 90d":null;
          if (!status) continue;
          rows.push([e.name, currentSite(e)||"—", t, formatDate(v.expiration), status, days]);
        }
      });
      rows.sort((a,b)=> (typeof a[5]==="number"&&typeof b[5]==="number") ? a[5]-b[5] : 0);
      const header = rows.shift(); rows.unshift(header);
      const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"]=[{wch:28},{wch:20},{wch:28},{wch:14},{wch:14},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws,"Vencimentos");
      XLSX.writeFile(wb,"vencimentos_"+fileSuffix()+".xlsx");
      setGenerating(false);
    }

    async function genAttendance() {
      setGenerating(true);
      const XLSX = await ensureXLSX();
      const active = applyEmpFilters(employees.filter(e=>e.contract_status==="ACTIVE"));
      const rows = [["Funcionário","Obra","UF","Presenças","Faltas","Sick Days","Training","Total dias"]];
      active.forEach(e=>{
        const hist = (e.daily_history||[]).filter(h=>{ const d=parseD(h.date); return d && d>=fromDate && d<=toDate; });
        if (!hist.length) return;
        const c = {PRESENTE:0,FALTA:0,"SICK DAY":0,"TRAINING UNION":0};
        hist.forEach(h=>{ c[h.status]=(c[h.status]||0)+1; });
        rows.push([e.name, currentSite(e)||"—", e.state||"—", c.PRESENTE, c.FALTA, c["SICK DAY"], c["TRAINING UNION"], hist.length]);
      });
      const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"]=[{wch:28},{wch:20},{wch:6},{wch:11},{wch:9},{wch:11},{wch:10},{wch:11}];
      XLSX.utils.book_append_sheet(wb,ws,"Presença");
      XLSX.writeFile(wb,"presenca_"+fileSuffix()+".xlsx");
      setGenerating(false);
    }

    async function genTrainingMatrix() {
      setGenerating(true);
      const XLSX = await ensureXLSX();
      const active = applyEmpFilters(employees.filter(e=>e.contract_status==="ACTIVE"));
      // collect all training names used
      const allTrainings = [...new Set(active.flatMap(e=>Object.keys(e.trainings||{})))].sort();
      const rows = [["Funcionário","Obra","UF", ...allTrainings]];
      active.forEach(e=>{
        const cells = allTrainings.map(t=>{ const v=e.trainings?.[t]; return v?(v.issued?formatDate(v.issued):"✓"):""; });
        rows.push([e.name, currentSite(e)||"—", e.state||"—", ...cells]);
      });
      const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"]=[{wch:28},{wch:20},{wch:6},...allTrainings.map(()=>({wch:16}))];
      XLSX.utils.book_append_sheet(wb,ws,"Matriz");
      XLSX.writeFile(wb,"matriz_treinamentos_"+fileSuffix()+".xlsx");
      setGenerating(false);
    }

    async function genHeadcount() {
      setGenerating(true);
      const XLSX = await ensureXLSX();
      const active = applyEmpFilters(employees.filter(e=>e.contract_status==="ACTIVE"));
      const bySite = {}, byState = {};
      active.forEach(e=>{ const s=currentSite(e)||"(Sem obra)", st=(e.state||"—").toUpperCase();
        bySite[s]=(bySite[s]||0)+1; byState[st]=(byState[st]||0)+1; });
      const rows = [["Headcount por Obra",""],["Obra","Ativos"]];
      Object.entries(bySite).sort((a,b)=>b[1]-a[1]).forEach(([s,n])=>rows.push([s,n]));
      rows.push(["",""],["Headcount por Estado",""],["Estado","Ativos"]);
      Object.entries(byState).sort((a,b)=>b[1]-a[1]).forEach(([s,n])=>rows.push([s,n]));
      rows.push(["",""],["TOTAL ATIVOS",active.length]);
      const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"]=[{wch:30},{wch:12}];
      XLSX.utils.book_append_sheet(wb,ws,"Headcount");
      XLSX.writeFile(wb,"headcount_"+fileSuffix()+".xlsx");
      setGenerating(false);
    }

    const REPORTS = [
      {id:"compliance", icon:"✅", title:"Compliance por Obra", desc:"% de cada obra com os cursos obrigatórios em dia", fn:genComplianceBySite, usesPeriod:false},
      {id:"expirations", icon:"⏰", title:"Vencimentos", desc:"Cursos vencidos ou vencendo em 30/60/90 dias", fn:genExpirations, usesPeriod:false},
      {id:"attendance", icon:"📋", title:"Presença Mensal", desc:"Presenças, faltas e sick days do Daily no período", fn:genAttendance, usesPeriod:true},
      {id:"matrix", icon:"📊", title:"Matriz de Treinamentos", desc:"Funcionários × cursos com as datas", fn:genTrainingMatrix, usesPeriod:false},
      {id:"headcount", icon:"👥", title:"Headcount", desc:"Quantos ativos por obra e por estado", fn:genHeadcount, usesPeriod:false},
    ];

    const selStyle = {...s.sel, padding:"6px 10px", fontSize:12};

    return e("div",null,
      e("h2",{style:s.h2}, "📄 Relatórios"),
      e("div",{style:{color:"#64748b",fontSize:13,marginBottom:16}}, "Gere relatórios em Excel com filtros de período, obra e estado."),

      // Filters card
      e("div",{style:{...s.card,marginBottom:16}},
        e("div",{style:{fontWeight:700,fontSize:14,marginBottom:12,color:"#38bdf8"}},"🔎 Filtros"),
        e("div",{style:{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-end"}},
          // Period
          e("div",null,
            e("div",{style:{fontSize:11,color:"#64748b",marginBottom:4,fontWeight:600}},"Período (para Presença)"),
            e("div",{style:{display:"flex",gap:6,alignItems:"center"}},
              e("select",{style:selStyle,value:fromMonth,onChange:ev=>setFromMonth(ev.target.value)}, ...months.map(m=>e("option",{key:m,value:m},monthNames[parseInt(m)-1]))),
              e("select",{style:selStyle,value:fromYear,onChange:ev=>setFromYear(+ev.target.value)}, ...years.map(y=>e("option",{key:y,value:y},y))),
              e("span",{style:{color:"#64748b"}},"→"),
              e("select",{style:selStyle,value:toMonth,onChange:ev=>setToMonth(ev.target.value)}, ...months.map(m=>e("option",{key:m,value:m},monthNames[parseInt(m)-1]))),
              e("select",{style:selStyle,value:toYear,onChange:ev=>setToYear(+ev.target.value)}, ...years.map(y=>e("option",{key:y,value:y},y)))
            )
          ),
          // Site
          e("div",null,
            e("div",{style:{fontSize:11,color:"#64748b",marginBottom:4,fontWeight:600}},"Obra"),
            e("select",{style:{...selStyle,minWidth:160},value:repSite,onChange:ev=>setRepSite(ev.target.value)},
              ...allSites.map(st=>e("option",{key:st,value:st},st==="ALL"?"Todas":st)))
          ),
          // State
          e("div",null,
            e("div",{style:{fontSize:11,color:"#64748b",marginBottom:4,fontWeight:600}},"Estado"),
            e("select",{style:selStyle,value:repState,onChange:ev=>setRepState(ev.target.value)},
              ...allStates.map(st=>e("option",{key:st,value:st},st==="ALL"?"Todos":st)))
          )
        ),
        e("div",{style:{marginTop:10,fontSize:12,color:"#38bdf8"}}, "📅 "+periodLabel()+(repSite!=="ALL"?" • "+repSite:"")+(repState!=="ALL"?" • "+repState:""))
      ),

      // Report cards
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14}},
        ...REPORTS.map(r=>e("div",{key:r.id,style:{...s.card,marginBottom:0,display:"flex",flexDirection:"column",gap:8}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("span",{style:{fontSize:26}},r.icon),
            e("div",null,
              e("div",{style:{fontWeight:700,fontSize:15}},r.title),
              r.usesPeriod && e("span",{style:{fontSize:10,color:"#38bdf8",fontWeight:600}},"usa o período")
            )
          ),
          e("div",{style:{color:"#94a3b8",fontSize:12,flex:1,lineHeight:1.5}},r.desc),
          e("button",{style:{...s.btn("success"),width:"100%",opacity:generating?0.5:1},disabled:generating,
            onClick:r.fn}, generating?"⟳ Gerando...":"⬇️ Gerar Excel")
        ))
      )
    );
  }


  // ─ Schedule ─
  function Schedule() {
    const showForm = sched_showForm, setShowForm = sched_setShowForm;
    const editingId = sched_editingId, setEditingId = sched_setEditingId;
    const formData = sched_formData, setFormData = sched_setFormData;
    const participantSearch = sched_participantSearch, setParticipantSearch = sched_setParticipantSearch;

    function resetForm() {
      setFormData({ training:"", date:"", location:"", instructor:"", notes:"", participants:[], status:"scheduled" });
      setShowForm(false);
      setEditingId(null);
      setParticipantSearch("");
    }

    function createSchedule() {
      if (!formData.training || !formData.date) {
        alert(tr("sched_training") + " + " + tr("sched_date"));
        return;
      }
      if (editingId) {
        setScheduledTrainings(prev => prev.map(s => s.id === editingId ? { ...formData, id: editingId } : s));
      } else {
        const newSched = { ...formData, id: "sch_" + Date.now(), createdAt: new Date().toISOString() };
        setScheduledTrainings(prev => [newSched, ...prev]);
      }
      resetForm();
    }

    function editSched(s) {
      setFormData({ ...s });
      setEditingId(s.id);
      setShowForm(true);
    }

    function completeSchedule(sched) {
      if (!window.confirm(tr("confirm_complete", { n: sched.participants.length }))) return;
      // Apply training to all participants
      const issuedDate = sched.date;
      setEmployees(prev => prev.map(emp => {
        if (sched.participants.includes(emp.name)) {
          return {
            ...emp,
            trainings: {
              ...emp.trainings,
              [sched.training]: { issued: issuedDate, expiration: null }
            }
          };
        }
        return emp;
      }));
      setScheduledTrainings(prev => prev.map(s => s.id === sched.id ? { ...s, status: "completed", completedAt: new Date().toISOString() } : s));
    }

    function cancelSched(id) {
      if (!window.confirm(tr("confirm_cancel"))) return;
      setScheduledTrainings(prev => prev.map(s => s.id === id ? { ...s, status: "cancelled" } : s));
    }

    function deleteSched(id) {
      if (!window.confirm(tr("confirm_delete_sched"))) return;
      setScheduledTrainings(prev => prev.filter(s => s.id !== id));
    }

    function toggleParticipant(name) {
      setFormData(p => ({
        ...p,
        participants: p.participants.includes(name)
          ? p.participants.filter(n => n !== name)
          : [...p.participants, name]
      }));
    }

    function statusColor(status) {
      if (status === "scheduled") return { bg:"#0f2744", border:"#38bdf8", text:"#38bdf8" };
      if (status === "progress") return { bg:"#2d1a00", border:"#f59e0b", text:"#f59e0b" };
      if (status === "completed") return { bg:"#0d2d1a", border:"#22c55e", text:"#22c55e" };
      if (status === "cancelled") return { bg:"#1e293b", border:"#64748b", text:"#64748b" };
      return { bg:"#1e293b", border:"#334155", text:"#94a3b8" };
    }

    function dayLabel(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return "—";
      const days = daysUntil(dateStr);
      if (days === 0) return tr("today");
      if (days === 1) return tr("tomorrow");
      if (days < 0) return Math.abs(days) + " " + tr("days_left") + " (-)";
      return "+" + days + " " + tr("days_left");
    }

    // Filter active employees for participant selection
    const availableEmps = employees
      .filter(emp => emp.contract_status === "ACTIVE")
      .filter(emp => !participantSearch || emp.name.toLowerCase().includes(participantSearch.toLowerCase()));

    // Sort schedules by date
    const sorted = [...scheduledTrainings].sort((a, b) => {
      if (a.date < b.date) return -1;
      if (a.date > b.date) return 1;
      return 0;
    });

    const upcoming = sorted.filter(s => s.status === "scheduled" && parseDate(s.date) >= new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()));
    const past = sorted.filter(s => s.status !== "scheduled" || parseDate(s.date) < new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()));

    function ScheduleCard({ s }) {
      const sc = statusColor(s.status);
      return e("div", { style: { ...s2.card, marginBottom:12, borderLeft:`4px solid ${sc.border}` } },
        e("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, flexWrap:"wrap", gap:8 } },
          e("div", { style: { flex:1, minWidth:200 } },
            e("div", { style: { fontWeight:700, fontSize:15, marginBottom:4 } }, s.training),
            e("div", { style: { color:"#94a3b8", fontSize:12 } },
              "📅 " + formatDate(s.date) + " · " + dayLabel(s.date),
              s.location ? " · 📍 " + s.location : "",
              s.instructor ? " · 👤 " + s.instructor : ""
            )
          ),
          e("span", { style: {
            padding:"3px 10px", borderRadius:8, fontSize:11, fontWeight:700,
            background:sc.bg, color:sc.text, border:`1px solid ${sc.border}`
          }}, tr("status_" + s.status))
        ),
        s.notes && e("div", { style: { color:"#64748b", fontSize:12, marginBottom:10, fontStyle:"italic" } }, s.notes),
        e("div", { style: { marginBottom:10 } },
          e("div", { style: { color:"#64748b", fontSize:11, marginBottom:4, fontWeight:600 } },

  function HRDashboard() {
    // All state from module level — NO local hooks (avoids React #310 error)
    const hrPeriodFrom = hr_year, setPeriodFrom = hr_setYear;
    const periodFromMonth = hr_fromMonth, setPeriodFromMonth = hr_setFromMonth;
    const periodToYear = hr_toYear, setPeriodToYear = hr_setToYear;
    const periodToMonth = hr_toMonth, setPeriodToMonth = hr_setToMonth;
    const exitReasonFilter = hr_exitFilter, setExitReasonFilter = hr_setExitFilter;

    function parseDateFlexible(s) {
      if (!s) return null;
      const cleaned = String(s).trim();
      const m = cleaned.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
      if (m) { const d = new Date(parseInt(m[3]), parseInt(m[1])-1, parseInt(m[2])); return isNaN(d)?null:d; }
      const m2 = cleaned.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m2) { const d = new Date(parseInt(m2[1]), parseInt(m2[2])-1, parseInt(m2[3])); return isNaN(d)?null:d; }
      const d = new Date(cleaned);
      return isNaN(d) ? null : d;
    }

    const fromDate = new Date(hrPeriodFrom, parseInt(periodFromMonth)-1, 1);
    const toDate = new Date(periodToYear, parseInt(periodToMonth)-1, 1);
    const toDateEnd = new Date(periodToYear, parseInt(periodToMonth), 0, 23, 59, 59);
    const currentYear = new Date().getFullYear();

    function applyPreset(label) {
      const now = new Date();
      if (label === "thisYear") { setPeriodFrom(currentYear); setPeriodFromMonth("01"); setPeriodToYear(currentYear); setPeriodToMonth("12"); }
      else if (label === "lastYear") { setPeriodFrom(currentYear-1); setPeriodFromMonth("01"); setPeriodToYear(currentYear-1); setPeriodToMonth("12"); }
      else if (label === "last6") { const s=new Date(now.getFullYear(),now.getMonth()-5,1); setPeriodFrom(s.getFullYear()); setPeriodFromMonth(String(s.getMonth()+1).padStart(2,"0")); setPeriodToYear(now.getFullYear()); setPeriodToMonth(String(now.getMonth()+1).padStart(2,"0")); }
      else if (label === "last3") { const s=new Date(now.getFullYear(),now.getMonth()-2,1); setPeriodFrom(s.getFullYear()); setPeriodFromMonth(String(s.getMonth()+1).padStart(2,"0")); setPeriodToYear(now.getFullYear()); setPeriodToMonth(String(now.getMonth()+1).padStart(2,"0")); }
      else if (label === "ytd") { setPeriodFrom(currentYear); setPeriodFromMonth("01"); setPeriodToYear(now.getFullYear()); setPeriodToMonth(String(now.getMonth()+1).padStart(2,"0")); }
    }

    const monthsInPeriod = [];
    let cur = new Date(fromDate);
    while (cur <= toDate) { monthsInPeriod.push({ year: cur.getFullYear(), month: cur.getMonth() }); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }

    const hiresByMonth = monthsInPeriod.map(() => 0);
    const layoffsByMonth = monthsInPeriod.map(() => 0);
    const hiredEmps = [], laidOffEmps = [], activeInPeriod = [];
    let totalHires = 0, totalLayoffs = 0;

    employees.forEach(emp => {
      const h = parseDateFlexible(emp.hire_date);
      if (h && h >= fromDate && h <= toDateEnd) {
        const idx = monthsInPeriod.findIndex(m => m.year===h.getFullYear() && m.month===h.getMonth());
        if (idx>=0) hiresByMonth[idx]++;
        totalHires++; hiredEmps.push(emp);
      }
      const matchesReason = exitReasonFilter === "ALL" || emp.exit_reason === exitReasonFilter;
      const l = parseDateFlexible(emp.lay_off_date);
      if (l && l >= fromDate && l <= toDateEnd && matchesReason) {
        const idx = monthsInPeriod.findIndex(m => m.year===l.getFullYear() && m.month===l.getMonth());
        if (idx>=0) layoffsByMonth[idx]++;
        totalLayoffs++; laidOffEmps.push(emp);
      }
      const hd = parseDateFlexible(emp.hire_date);
      const ld = parseDateFlexible(emp.lay_off_date);
      if (hd && hd <= toDateEnd && (!ld || ld >= fromDate)) activeInPeriod.push(emp);
    });

    const totalEmps = employees.length;
    const activeNow = employees.filter(e => e.contract_status === "ACTIVE").length;
    const avgHeadcount = activeInPeriod.length || 1;
    const turnoverRate = (totalLayoffs / avgHeadcount * 100).toFixed(1);
    const hireRate = (totalHires / avgHeadcount * 100).toFixed(1);
    const avgHires = monthsInPeriod.length > 0 ? (totalHires / monthsInPeriod.length).toFixed(1) : "0";
    const avgLayoffs = monthsInPeriod.length > 0 ? (totalLayoffs / monthsInPeriod.length).toFixed(1) : "0";
    const monthNames = CURRENT_LANG === "en"
      ? ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
      : ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const years = Array.from({length:10},(_,i)=>currentYear-i);
    const months = ["01","02","03","04","05","06","07","08","09","10","11","12"];

    function BarChart({ data, color }) {

        e("div",{style:{...s.card,marginBottom:0,textAlign:"center"}}, e("div",{style:{fontSize:32,fontWeight:800,color:parseFloat(turnoverRate)>30?"#ef4444":"#f59e0b"}},turnoverRate+"%"), e("div",{style:{fontSize:12,color:"#94a3b8",marginTop:4}},tr("hr_turnover_rate")))

          e("select",{style:selStyle,value:periodFromMonth,onChange:ev=>setPeriodFromMonth(ev.target.value)}, ...months.map(m=>e("option",{key:m,value:m},monthNames[parseInt(m)-1]))),

          e("span",{style:{color:"#94a3b8",fontSize:13,fontWeight:600,marginLeft:8}},"Até:"),
          e("select",{style:selStyle,value:periodToMonth,onChange:ev=>setPeriodToMonth(ev.target.value)}, ...months.map(m=>e("option",{key:m,value:m},monthNames[parseInt(m)-1]))),
          e("select",{style:selStyle,value:periodToYear,onChange:ev=>setPeriodToYear(parseInt(ev.target.value))}, ...years.map(y=>e("option",{key:y,value:y},y))),

        )
      ),

      // Period stats
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:16}},

  // ─ Site Manager ─
  function SiteManager() {
    const siteSearch = site_search, setSiteSearch = site_setSearch;
    const siteStatusFilter = site_statusFilter, setSiteStatusFilter = site_setStatusFilter;
    const uploadResults = site_uploadResults, setUploadResults = site_setUploadResults;
    const processing = site_processing, setProcessing = site_setProcessing;
    const dragOver = site_dragOver, setDragOver = site_setDragOver;
    const editingRows = site_editingRows, setEditingRows = site_setEditingRows;
    const historyEmp = site_historyEmp, setHistoryEmp = site_setHistoryEmp;
    const savedMsg = site_savedMsg, setSavedMsg = site_setSavedMsg;

    const knownSites = [...new Set(employees.map(e=>e.working_site).filter(x=>x&&x!=="NOT FOUND"&&x!==""))].sort();

    const filtered = employees.filter(emp => {
      if (siteStatusFilter !== "ALL" && emp.contract_status !== siteStatusFilter) return false;
      if (siteSearch) { const q = siteSearch.toLowerCase(); return emp.name.toLowerCase().includes(q)||(emp.working_site||"").toLowerCase().includes(q); }
      return true;
    });

    function saveSite(emp) {
      const newSite = editingRows[emp.name] ?? emp.working_site;
      if (newSite === emp.working_site) { setEditingRows(p=>{const n={...p};delete n[emp.name];return n;}); return; }
      const historyEntry = { date: new Date().toISOString().slice(0,10), from: emp.working_site||"—", to: newSite||"—" };
      setEmployees(prev => prev.map(e => e.name!==emp.name?e:{...e,working_site:newSite,site_history:[...(e.site_history||[]),historyEntry]}));
      setEditingRows(p=>{const n={...p};delete n[emp.name];return n;});
      setSavedMsg(emp.name+" → "+(newSite||"—")); setTimeout(()=>setSavedMsg(""),3000);

    }

    function updateRecord(empName, field, value) {

    }

    function buildRecordsForDate(targetDate, empList) {
      // First check historyCache (most up-to-date)
      if (historyCache[targetDate]) return {...historyCache[targetDate]};
      // Check employees daily_history — only include who has a record for this date
      const saved = {};
      empList.forEach(emp => {
        const hist = (emp.daily_history||[]).find(h=>h.date===targetDate);
        if (hist) saved[emp.name] = {status:hist.status, project:hist.project, obs:hist.obs};
        // If no history for this date, don't add them — day stays empty
      });
      return saved;

      setDate(newDate);
      setCurrentDate(newDate);
      setRecords(newRecs);
    }

    // Init records for today if empty
    if (Object.keys(records).length === 0 && allActive.length > 0) {
      setTimeout(() => {
        const newRecs = buildRecordsForDate(date, allActive);
        setRecords(newRecs);
        setCurrentDate(date);
      }, 0);

    function saveDay() {
      // Save to historyCache immediately (sync)
      setHistoryCache(prev => ({...prev, [date]: {...records}}));
      // Save to employees (async, for persistence to Sheets)
      setEmployees(prev=>prev.map(emp=>{
        const rec = records[emp.name]; if (!rec) return emp;
        const st = rec.status||"PRESENTE";
        const hist = (emp.daily_history||[]).filter(h=>h.date!==date);
        hist.push({date,status:st,project:rec.project||emp.working_site||"",obs:rec.obs||""});
        const shouldUpdateSite = st==="PRESENTE" || st==="TRAINING UNION";
        const newSite = shouldUpdateSite ? (rec.project||emp.working_site) : emp.working_site;
        const siteChanged = shouldUpdateSite && rec.project && rec.project!==emp.working_site;
        const siteHistory = siteChanged ? [...(emp.site_history||[]),{date,from:emp.working_site||"—",to:rec.project}] : (emp.site_history||[]);
        return {...emp,daily_history:hist,working_site:newSite||emp.working_site,site_history:siteHistory};
      }));
      setSavedMsg("Salvo!"); setTimeout(()=>setSavedMsg(""),3000);
    }

    async function processImport(file) {
      setProcessing(true); setImportResults(null);
      try {
        let XLSX = window.XLSX;
        if (!XLSX) {
          await new Promise((res,rej)=>{const sc=document.createElement("script");sc.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);});
          XLSX = window.XLSX;
        }
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf,{type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{defval:""});
        const norm = str => String(str).toLowerCase().replace(/\.+/g,"").replace(/[áàãâ]/g,"a").replace(/[éèê]/g,"e").replace(/[íì]/g,"i").replace(/[óòõô]/g,"o").replace(/[úù]/g,"u").replace(/ç/g,"c").replace(/\s+/g," ").trim();
        const si = str => str.split(" ").filter(w=>w.length>1).join(" ");
        const findEmp = raw => {
          const n=norm(raw);
          return employees.find(e=>norm(e.name)===n)||
            employees.find(e=>si(norm(e.name))===si(n))||
            employees.find(e=>{const ws=n.split(" ").filter(w=>w.length>2);return ws.length>=2&&ws.every(w=>norm(e.name).includes(w));})||
            employees.find(e=>{const p=n.split(" ").filter(w=>w.length>1);if(p.length<2)return false;const en=norm(e.name);return en.startsWith(p[0])&&en.includes(p[p.length-1]);})||
            employees.find(e=>{const p=n.split(" ").filter(w=>w.length>1);if(p.length<2)return false;const en=norm(e.name);return en.includes(p[p.length-1])&&en.startsWith(p[0][0]);});
        };
        const parseD = raw=>{const s=String(raw).trim();const m=s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);if(m){const yr=m[3].length===2?"20"+m[3]:m[3];return yr+"-"+String(m[1]).padStart(2,"0")+"-"+String(m[2]).padStart(2,"0");}const m2=s.match(/(\d{4})-(\d{2})-(\d{2})/);return m2?s.slice(0,10):null;};
        const byDate={},notFound=[];
        for(const row of rows){
          const rawName=String(row["Workers"]||row["Name"]||row["name"]||row["NOME"]||"").trim();
          if(!rawName)continue;
          const project=String(row["Project"]||row["Projetc"]||row["Working Site"]||row["Local"]||"").trim();
          const rawSt=String(row["Status"]||"").trim().toUpperCase();
          const obs=String(row["OBS"]||row["Obs"]||row["obs"]||"").trim();
          const rawDate=String(row["Date"]||row["date"]||row["Data"]||"").trim();
          let status="PRESENTE";
          if(["FALTA","ABSENT","AUSENTE","SABADO","DOMINGO","FERIADO","FOLGA"].includes(rawSt))status="FALTA";
          else if(rawSt.includes("SICK")||rawSt.includes("DOENTE"))status="SICK DAY";
          else if(rawSt.includes("TRAINING")||rawSt.includes("TREINAMENTO")||rawSt.includes("ORIENTA"))status="TRAINING UNION";
          const rowDate=parseD(rawDate)||date;
          const emp=findEmp(rawName);
          if(!emp){if(!notFound.includes(rawName))notFound.push(rawName);continue;}
          if(!byDate[rowDate])byDate[rowDate]={};
          byDate[rowDate][emp.name]={status,project,obs};
        }
        const dates=Object.keys(byDate).sort();
        const totalUpdates=Object.values(byDate).reduce((s,d)=>s+Object.keys(d).length,0);
        setImportResults({byDate,notFound,dates,totalUpdates,lastDate:dates[dates.length-1]||date});
      }catch(err){setImportResults({error:String(err)});}
      setProcessing(false);
    }


    function applyImport() {
      const ir = importResults;
      if (!ir) return;

      // Support both old format (updates[]) and new format (byDate{})
      const byDate = ir.byDate || (ir.updates ? {[ir.date||date]: Object.fromEntries(ir.updates.map(u=>[u.empName,{status:u.status,project:u.project,obs:u.obs}]))} : null);
      if (!byDate) return;

      const dates = Object.keys(byDate).sort();
      const lastDate = dates[dates.length-1] || date;

      // Build new cache — only store employees who appear in each day's sheet
      // (do NOT pad with all active employees — respect exact headcount)
      const newCache = {...historyCache};
      dates.forEach(d => {
        newCache[d] = byDate[d]; // exactly who was in the spreadsheet
      });
      setHistoryCache(newCache);

      // Save to employees daily_history
      setEmployees(prev => prev.map(emp => {
        let updatedEmp = {...emp, daily_history: [...(emp.daily_history||[])]};
        dates.forEach(d => {
          const rec = byDate[d]?.[emp.name];
          if (!rec) return; // not in spreadsheet for this day — don't touch
          const st = rec.status||"PRESENTE";
          updatedEmp.daily_history = updatedEmp.daily_history.filter(h=>h.date!==d);
          updatedEmp.daily_history.push({date:d, status:st, project:rec.project||emp.working_site||"", obs:rec.obs||""});
          // Update working_site only for last day and if present
          if (d===lastDate && (st==="PRESENTE"||st==="TRAINING UNION") && rec.project && rec.project!==updatedEmp.working_site) {
            updatedEmp.site_history = [...(updatedEmp.site_history||[]), {date:d, from:updatedEmp.working_site||"—", to:rec.project}];
            updatedEmp.working_site = rec.project;
          }
        });
        return updatedEmp;
      }));

      // Show last imported day
      setRecords(newCache[lastDate] || {});
      setDate(lastDate);
