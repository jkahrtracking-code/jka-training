      setSearchCoords(coords);

      // 2. Geocode all employee addresses (with progress)
      const empsWithAddr = employees.filter(emp => buildEmpAddress(emp).length > 5);
      setProgress({ current: 0, total: empsWithAddr.length });

      const found = [];
      for (let i = 0; i < empsWithAddr.length; i++) {
        const emp = empsWithAddr[i];
        const addr = buildEmpAddress(emp);
        let empCoords = GEO_CACHE[addr.toLowerCase()];

        if (!empCoords) {
          empCoords = await geocodeAddress(addr);
          // Rate limit: Nominatim allows 1 req/sec - add small delay
          await new Promise(r => setTimeout(r, 1100));
        }

        if (empCoords) {
          const dist = distanceMiles(coords.lat, coords.lng, empCoords.lat, empCoords.lng);
          if (dist <= radius) {
            found.push({ ...emp, _distance: dist, _coords: empCoords });
          }
        }
        setProgress({ current: i + 1, total: empsWithAddr.length });
      }

      found.sort((a, b) => a._distance - b._distance);
      setResults(found);
      setSearching(false);
    }

    const filtered = results.filter(emp => {
      if (statusFilter === "ACTIVE") return emp.contract_status === "ACTIVE";
      if (statusFilter === "INACTIVE") return emp.contract_status !== "ACTIVE";
      return true;
    });

    function copyAddresses() {
      const txt = filtered.map((emp, i) =>
        `${i+1}. ${emp.name} - ${buildEmpAddress(emp)} (${emp._distance.toFixed(1)} ${tr("miles")})`
      ).join("\n");
      navigator.clipboard?.writeText(txt);
    }

    return e("div",null,
      e("h2",{style:s.h2}, tr("residents_title")),

      // Search form
      e("div",{style:s.card},
        e("div",{style:{display:"grid",gridTemplateColumns:"3fr 1fr auto",gap:10,marginBottom:14}},
          e("div",null,
            e("label",{style:{color:"#94a3b8",fontSize:12,display:"block",marginBottom:4}}, tr("residents_address_label")),
            e("input",{
              style:{...s.input,width:"100%",boxSizing:"border-box"},
              placeholder:tr("residents_address_ph"),
              value:address,
              onChange:ev=>setAddress(ev.target.value),
              onKeyDown:ev=>{if(ev.key==="Enter"&&!searching)doSearch();}
            })
          ),
          e("div",null,
            e("label",{style:{color:"#94a3b8",fontSize:12,display:"block",marginBottom:4}}, tr("residents_radius_label")),
            e("input",{
              style:{...s.input,width:"100%",boxSizing:"border-box"},
              type:"number", min:1, max:200,
              value:radius,
              onChange:ev=>setRadius(parseInt(ev.target.value)||25)
            })
          ),
          e("div",{style:{display:"flex",alignItems:"flex-end"}},
            e("button",{
              style:{...s.btn("primary"),opacity:searching?0.5:1,padding:"10px 20px"},
              disabled:searching,
              onClick:doSearch
            }, searching ? "⟳" : tr("residents_search"))
          )
        ),

        // Status filter
        results.length > 0 && e("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
          e("span",{style:{color:"#94a3b8",fontSize:12}}, tr("residents_filter_status")),
          ...[["ALL",tr("residents_all")],["ACTIVE",tr("residents_active_only")],["INACTIVE",tr("residents_inactive_only")]].map(([v,l]) =>
            e("button",{key:v,
              style:{
                padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:11,
                background:statusFilter===v?"#38bdf8":"#1e293b",
                color:statusFilter===v?"#0f172a":"#94a3b8",
                border:statusFilter===v?"none":"1px solid #334155"
              },
              onClick:()=>setStatusFilter(v)
            }, l)
          ),
          filtered.length > 0 && e("button",{
            style:{...s.btn(),marginLeft:"auto",fontSize:12,padding:"4px 12px"},
            onClick:copyAddresses
          }, tr("copy_addresses"))
        )
      ),

      // Progress while searching
      searching && progress.total > 0 && e("div",{style:s.card},
        e("div",{style:{color:"#94a3b8",fontSize:13,marginBottom:8,textAlign:"center"}},
          tr("residents_searching") + " " + progress.current + " / " + progress.total
        ),
        e("div",{style:{height:6,background:"#0f172a",borderRadius:3,overflow:"hidden"}},
          e("div",{style:{
            width: (progress.current/progress.total*100) + "%",
            height:"100%",background:"#38bdf8",transition:"width 0.3s"
          }})
        )
      ),

      // Error message
      error && e("div",{style:{...s.card,border:"1px solid #ef4444",color:"#ef4444"}}, "⚠️ " + error),

      // Results
      !searching && results.length === 0 && searchCoords && !error && e("div",{style:{...s.card,color:"#f59e0b"}},
        "🔍 " + tr("residents_no_match")
      ),

      filtered.length > 0 && e("div",{style:s.card},
        e("div",{style:{color:"#64748b",fontSize:12,marginBottom:12}},
          `${filtered.length} ${tr("residents_found")}`
        ),
        e("div",{style:s.tw},
          e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
            e("thead",null,e("tr",null,...[tr("residents_distance"),tr("col_name"),tr("f_phone"),tr("f_street"),tr("col_status"),""].map(h=>e("th",{key:h,style:s.th},h)))),
            e("tbody",null,
              ...filtered.map(emp => e("tr",{key:emp.name},
                e("td",{style:{...s.td,fontWeight:700,color:"#38bdf8"}},
                  emp._distance.toFixed(1) + " " + tr("miles")
                ),
                e("td",{style:s.td},
                  e("span",{style:{fontWeight:600,color:"#e2e8f0",cursor:"pointer"},
                    onClick:()=>openEmp(emp)}, emp.name)
                ),
                e("td",{style:{...s.td,color:"#94a3b8",fontSize:12}}, emp.phone || "—"),
                e("td",{style:{...s.td,color:"#94a3b8",fontSize:12}}, buildEmpAddress(emp) || "—"),
                e("td",{style:s.td}, e("span",{style:s.tag(emp.contract_status==="ACTIVE")}, emp.contract_status)),
                e("td",{style:s.td}, e("button",{style:s.btn("primary"),onClick:()=>openEmp(emp)}, tr("view")))
              ))
            )
          )
        )
      )
    );
  }

  // ─ Nav ─
  const navActive = (id) => view===id || (view==="detail" && id==="emps");

  return e("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif",background:"#0f172a",color:"#f1f5f9"}},
    // Header
    e("div",{style:{background:"#1e293b",borderBottom:"1px solid #334155",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,flexWrap:"wrap"}},
      e("div",{style:{fontSize:18,fontWeight:800,color:"#38bdf8"}},"🏗️ TrainingTracker"),
      dbStatus==="connected" && e("span",{style:{fontSize:11,color:"#22c55e",background:"#0d2d1a",border:"1px solid #22c55e",borderRadius:20,padding:"2px 10px"}},
        "● "+tr("online") + (lastSaved ? " · "+new Date(lastSaved).toLocaleTimeString(I18N[CURRENT_LANG].locale,{hour:"2-digit",minute:"2-digit"}) : "")),
      dbStatus==="connecting" && e("span",{style:{fontSize:11,color:"#38bdf8",background:"#0f2744",border:"1px solid #38bdf8",borderRadius:20,padding:"2px 10px"}},tr("connecting")),
      dbStatus==="saving" && e("span",{style:{fontSize:11,color:"#f59e0b",background:"#2d1a00",border:"1px solid #f59e0b",borderRadius:20,padding:"2px 10px"}},tr("saving")),
      dbStatus==="error" && e("span",{style:{fontSize:11,color:"#ef4444",background:"#2d0a0a",border:"1px solid #ef4444",borderRadius:20,padding:"2px 10px"}},"● "+tr("error_save")),
      dbStatus==="local" && e("span",{style:{fontSize:11,color:"#f59e0b",background:"#2d1a00",border:"1px solid #f59e0b",borderRadius:20,padding:"2px 10px"}},"● "+tr("local")),
      e("button",{
        style:{
          marginLeft:"auto",
          padding:"6px 12px",borderRadius:8,border:"1px solid #334155",
          background:"#0f172a",color:"#94a3b8",cursor:"pointer",
          fontSize:12,fontWeight:600
        },
        onClick:()=>{
          CURRENT_LANG = CURRENT_LANG === "pt" ? "en" : "pt";
          localStorage.setItem("tt_lang", CURRENT_LANG);
          BADGE = makeBadges();
          window.location.reload();
        }
      }, CURRENT_LANG === "pt" ? "🇺🇸 EN" : "🇧🇷 PT"),
      e("nav",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        ...[ ["hr",tr("nav_hr")], ["emps",tr("nav_emps")], ["dashboard",tr("nav_dashboard")], ["bysite",tr("nav_bysite")], ["alerts",tr("nav_alerts")], ["missing",tr("nav_missing")], ["reports",tr("nav_reports")], ["schedule","📅 "+tr("nav_schedule")], ["residents",tr("nav_residents")], ["daily",tr("nav_daily")], ["upload",tr("nav_upload")] ]
          .map(([id,label])=>e("button",{key:id,
            style:{padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,
              background:navActive(id)?"#38bdf8":"transparent",
              color:navActive(id)?"#0f172a":"#94a3b8"},
            onClick:()=>{setView(id);setSearch("");setEditingEmp(null);window.location.hash=id;}},
            label,
            id==="alerts"&&alerts.length>0&&e("span",{style:{background:"#fee2e2",color:"#991b1b",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700,marginLeft:6}},alerts.length)
          ))
      )
    ),
    // Main content
    e("div",{style:{flex:1,padding:"20px",maxWidth:1300,margin:"0 auto",width:"100%"}},
      view==="dashboard" && Dashboard(),
      view==="bysite" && BySite(),
      view==="hr" && HRDashboard(),
      view==="residents" && Residents(),
      view==="schedule" && Schedule(),
      view==="emps" && EmpList(),
      view==="detail" && EmpDetail(),
      view==="alerts" && Alerts(),
      view==="missing" && Missing(),
      view==="reports" && Reports(),
      view==="daily" && Daily(),
      view==="upload" && Upload(),
      false
    )
  );
}

// ── Password Gate ──────────────────────────────────────────────
const APP_PASSWORD = "trainingjka";
const PWD_KEY = "tt_authed_v1";

function PasswordGate() {
  const [pwd, setPwd] = React.useState("");
  const [err, setErr] = React.useState(false);

  function tryLogin() {
    if (pwd === APP_PASSWORD) {
      sessionStorage.setItem(PWD_KEY, "1");
      setAuthed(true);
    } else {
      setErr(true);
      setPwd("");
      setTimeout(() => setErr(false), 1500);
    }
  }

  return React.createElement("div", {
    style: {
      minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif", background:"#0f172a", color:"#f1f5f9"
    }
  },
    React.createElement("div", {
      style: { background:"#1e293b", border:"1px solid #334155", borderRadius:14, padding:"36px 40px", maxWidth:400, width:"90%", boxShadow:"0 20px 60px rgba(0,0,0,0.5)" }
    },
      React.createElement("div", {style:{fontSize:30,marginBottom:12,textAlign:"center"}}, "🏗️"),
      React.createElement("div", {style:{fontSize:22,fontWeight:800,color:"#38bdf8",textAlign:"center",marginBottom:6}}, "TrainingTracker"),
      React.createElement("div", {style:{fontSize:13,color:"#94a3b8",textAlign:"center",marginBottom:24}}, CURRENT_LANG === "en" ? "Enter password to access" : "Digite a senha para acessar"),
      React.createElement("input", {
        type:"password",
        autoFocus:true,
        placeholder:CURRENT_LANG === "en" ? "Password" : "Senha",
        value:pwd,
        onChange:e=>setPwd(e.target.value),
        onKeyDown:e=>{if(e.key==="Enter")tryLogin();},
        style:{
          width:"100%", padding:"12px 16px", borderRadius:10, fontSize:14,
          background:"#0f172a", color:"#f1f5f9", outline:"none",
          border: err ? "1px solid #ef4444" : "1px solid #334155",
          marginBottom:14, boxSizing:"border-box"
        }
      }),
      err && React.createElement("div",{style:{color:"#ef4444",fontSize:12,marginBottom:10,textAlign:"center"}},CURRENT_LANG === "en" ? "❌ Incorrect password" : "❌ Senha incorreta"),
      React.createElement("button", {
        onClick:tryLogin,
        style:{
          width:"100%", padding:"12px", borderRadius:10, border:"none", cursor:"pointer",
          fontWeight:700, fontSize:14, background:"#38bdf8", color:"#0f172a"
        }
      }, CURRENT_LANG === "en" ? "Enter" : "Entrar")
    )
  );
}

let setAuthed;
function Root() {
  const [authed, _setAuthed] = React.useState(sessionStorage.getItem(PWD_KEY) === "1");
  setAuthed = _setAuthed;
  return authed ? React.createElement(App) : React.createElement(PasswordGate);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root));
</script>
